<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="BuildFlow"/>
<title>BuildFlow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#F9FAFB;}
body{-webkit-font-smoothing:antialiased;font-family:'Inter',system-ui,sans-serif;}
input::placeholder,textarea::placeholder{color:#C1C7D0;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#E2E8F0;border-radius:4px;}
*{-webkit-tap-highlight-color:transparent;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
select{-webkit-appearance:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%);}to{opacity:1;transform:translateY(0);}}
.fu{animation:fadeUp 0.2s ease forwards;}
.fu1{animation:fadeUp 0.2s 0.04s ease both;}
.fu2{animation:fadeUp 0.2s 0.08s ease both;}
.fu3{animation:fadeUp 0.2s 0.12s ease both;}
.fu4{animation:fadeUp 0.2s 0.16s ease both;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef}=React;

const C={
  bg:       '#F9FAFB',
  white:    '#FFFFFF',
  border:   '#E5E7EB',
  border2:  '#F3F4F6',
  text:     '#111827',
  muted:    '#6B7280',
  soft:     '#9CA3AF',
  input:    '#FFFFFF',
  accent:   '#111827',
  blue:     '#2563EB',
  green:    '#059669',
  amber:    '#D97706',
  red:      '#DC2626',
  blueBg:   '#EFF6FF',
  greenBg:  '#ECFDF5',
  amberBg:  '#FFFBEB',
  redBg:    '#FEF2F2',
};

const KEY='buildflow2_v1';
const load=()=>{try{return JSON.parse(localStorage.getItem(KEY))||seed();}catch{return seed();}};
const save=d=>{try{localStorage.setItem(KEY,JSON.stringify(d));}catch{}};
const uid=()=>Math.random().toString(36).slice(2,8);
const today=()=>new Date().toISOString().split('T')[0];
const fmt$=n=>n>=1000?`$${(n/1000).toFixed(1)}k`:`$${n||0}`;

function seed(){return{
  leads:[
    {id:'l1',name:'Mike Thornton',phone:'479-555-0123',trade:'Roofing',source:'Facebook',status:'New',value:4200,notes:'Full reroof, 2400sqft. Wants estimate by Friday.',address:'123 Oak St, Bentonville AR',created:'2026-03-15'},
    {id:'l2',name:'Sarah Jenkins',phone:'479-555-0187',trade:'Plumbing',source:'Referral',status:'Quoted',value:850,notes:'Water heater replacement + fixture work',address:'456 Pine Ave, Rogers AR',created:'2026-03-17'},
    {id:'l3',name:'David Castillo',phone:'479-555-0244',trade:'HVAC',source:'Google',status:'Won',value:6500,notes:'Full HVAC replacement, 2 units',address:'789 Elm Dr, Springdale AR',created:'2026-03-10'},
  ],
  jobs:[
    {id:'j1',client:'David Castillo',trade:'HVAC',status:'In Progress',value:6500,start:'2026-03-18',address:'789 Elm Dr, Springdale AR',notes:'Units on order, install Tuesday'},
    {id:'j2',client:'Tom Bradley',trade:'Electrical',status:'Scheduled',value:1200,start:'2026-03-22',address:'321 Maple Ln, Fayetteville AR',notes:'Panel upgrade 200amp'},
  ],
  invoices:[
    {id:'i1',client:'David Castillo',amount:6500,status:'Sent',due:'2026-04-01',created:'2026-03-18'},
    {id:'i2',client:'James Porter',amount:3200,status:'Paid',due:'2026-03-10',created:'2026-03-01'},
  ],
};}

const STATUS={
  'New':        {color:C.blue,  bg:C.blueBg},
  'Contacted':  {color:'#7C3AED',bg:'#F5F3FF'},
  'Quoted':     {color:C.amber, bg:C.amberBg},
  'Won':        {color:C.green, bg:C.greenBg},
  'Lost':       {color:C.red,   bg:C.redBg},
  'In Progress':{color:C.blue,  bg:C.blueBg},
  'Scheduled':  {color:'#7C3AED',bg:'#F5F3FF'},
  'Complete':   {color:C.green, bg:C.greenBg},
  'On Hold':    {color:C.amber, bg:C.amberBg},
  'Draft':      {color:C.muted, bg:C.border2},
  'Sent':       {color:C.amber, bg:C.amberBg},
  'Paid':       {color:C.green, bg:C.greenBg},
  'Overdue':    {color:C.red,   bg:C.redBg},
};

const Badge=({s})=>{
  const st=STATUS[s]||{color:C.muted,bg:C.border2};
  return <span style={{background:st.bg,color:st.color,fontSize:11,fontWeight:600,
    padding:'3px 8px',borderRadius:20,letterSpacing:'0.02em',display:'inline-block'}}>{s}</span>;
};

const Avatar=({name})=>{
  const initials=name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const colors=[['#DBEAFE','#1D4ED8'],['#D1FAE5','#065F46'],['#FEF3C7','#92400E'],
                ['#FCE7F3','#9D174D'],['#EDE9FE','#5B21B6'],['#FFEDD5','#9A3412']];
  const pick=colors[name.charCodeAt(0)%colors.length];
  return <div style={{width:36,height:36,borderRadius:'50%',background:pick[0],
    display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
    fontSize:12,fontWeight:600,color:pick[1],letterSpacing:'0.04em'}}>{initials}</div>;
};

const Inp=({label,value,onChange,placeholder,type='text',style:sx={}})=>(
  <div style={{marginBottom:14}}>
    {label&&<label style={{display:'block',fontSize:12,fontWeight:500,color:C.text,
      marginBottom:5}}>{label}</label>}
    <input type={type} value={value} onChange={e=>onChange(e.target.value)}
      placeholder={placeholder}
      style={{width:'100%',background:C.white,border:`1px solid ${C.border}`,borderRadius:8,
        padding:'9px 12px',color:C.text,fontSize:14,fontFamily:'inherit',
        outline:'none',transition:'border-color 0.15s',...sx}}
      onFocus={e=>e.target.style.borderColor=C.blue}
      onBlur={e=>e.target.style.borderColor=C.border}/>
  </div>
);

const Sel=({label,value,onChange,options})=>(
  <div style={{marginBottom:14}}>
    {label&&<label style={{display:'block',fontSize:12,fontWeight:500,color:C.text,marginBottom:5}}>{label}</label>}
    <div style={{position:'relative'}}>
      <select value={value} onChange={e=>onChange(e.target.value)}
        style={{width:'100%',background:C.white,border:`1px solid ${C.border}`,borderRadius:8,
          padding:'9px 32px 9px 12px',color:C.text,fontSize:14,fontFamily:'inherit',
          outline:'none',cursor:'pointer'}}>
        {options.map(o=><option key={o}>{o}</option>)}
      </select>
      <div style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',
        pointerEvents:'none',color:C.muted,fontSize:10}}>▾</div>
    </div>
  </div>
);

const Btn=({onClick,children,variant='primary',style:sx={}})=>(
  <button onClick={onClick} style={{
    background:variant==='primary'?C.accent:C.white,
    color:variant==='primary'?C.white:C.text,
    border:variant==='primary'?'none':`1px solid ${C.border}`,
    borderRadius:8,padding:'9px 16px',fontSize:13,fontWeight:500,
    fontFamily:'inherit',cursor:'pointer',transition:'opacity 0.15s',
    display:'inline-flex',alignItems:'center',gap:6,...sx}}
    onMouseEnter={e=>e.currentTarget.style.opacity='0.85'}
    onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
    {children}
  </button>
);

function Modal({title,onClose,children}){
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.3)',zIndex:100,
      display:'flex',alignItems:'flex-end',justifyContent:'center'}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:C.white,borderRadius:'16px 16px 0 0',width:'100%',maxWidth:480,
        padding:'20px 20px 40px',animation:'slideUp 0.2s ease',
        maxHeight:'88vh',overflowY:'auto',borderTop:`1px solid ${C.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <span style={{fontSize:16,fontWeight:600,color:C.text}}>{title}</span>
          <button onClick={onClose} style={{background:'none',border:'none',
            color:C.muted,fontSize:18,cursor:'pointer',padding:'2px 6px',borderRadius:6,
            lineHeight:1}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Dashboard({data}){
  const pipeline=data.leads.filter(l=>l.status!=='Lost').reduce((a,l)=>a+(l.value||0),0);
  const collected=data.invoices.filter(i=>i.status==='Paid').reduce((a,i)=>a+(i.amount||0),0);
  const owed=data.invoices.filter(i=>i.status==='Sent'||i.status==='Overdue').reduce((a,i)=>a+(i.amount||0),0);
  const activeJobs=data.jobs.filter(j=>j.status==='In Progress'||j.status==='Scheduled');

  return(
    <div>
      <div className="fu" style={{marginBottom:24}}>
        <p style={{fontSize:13,color:C.muted,marginBottom:2}}>
          {new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
        </p>
        <h1 style={{fontSize:24,fontWeight:600,color:C.text,letterSpacing:'-0.02em'}}>Good morning</h1>
      </div>

      <div className="fu1" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:24}}>
        {[
          {label:'Pipeline',value:fmt$(pipeline),sub:`${data.leads.length} leads`},
          {label:'Active jobs',value:activeJobs.length,sub:'in progress'},
          {label:'Awaiting payment',value:fmt$(owed),sub:'outstanding'},
          {label:'Collected',value:fmt$(collected),sub:'total paid'},
        ].map(s=>(
          <div key={s.label} style={{background:C.white,borderRadius:12,padding:'14px 16px',
            border:`1px solid ${C.border}`}}>
            <p style={{fontSize:11,color:C.muted,fontWeight:500,marginBottom:6,
              letterSpacing:'0.02em'}}>{s.label.toUpperCase()}</p>
            <p style={{fontSize:22,fontWeight:600,color:C.text,letterSpacing:'-0.02em',
              marginBottom:2}}>{s.value}</p>
            <p style={{fontSize:11,color:C.soft}}>{s.sub}</p>
          </div>
        ))}
      </div>

      <div className="fu2" style={{marginBottom:24}}>
        <p style={{fontSize:12,fontWeight:500,color:C.muted,letterSpacing:'0.04em',
          textTransform:'uppercase',marginBottom:10}}>Recent Leads</p>
        <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:12,overflow:'hidden'}}>
          {data.leads.slice(-3).reverse().map((lead,i,arr)=>(
            <div key={lead.id} style={{padding:'13px 16px',
              borderBottom:i<arr.length-1?`1px solid ${C.border2}`:'none',
              display:'flex',alignItems:'center',gap:12}}>
              <Avatar name={lead.name}/>
              <div style={{flex:1,minWidth:0}}>
                <p style={{fontSize:14,fontWeight:500,color:C.text,marginBottom:2,
                  whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{lead.name}</p>
                <p style={{fontSize:12,color:C.muted}}>{lead.trade} · {lead.source}</p>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <p style={{fontSize:14,fontWeight:600,color:C.text,marginBottom:4}}>{fmt$(lead.value)}</p>
                <Badge s={lead.status}/>
              </div>
            </div>
          ))}
        </div>
      </div>

      {activeJobs.length>0&&(
        <div className="fu3">
          <p style={{fontSize:12,fontWeight:500,color:C.muted,letterSpacing:'0.04em',
            textTransform:'uppercase',marginBottom:10}}>Active Jobs</p>
          <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:12,overflow:'hidden'}}>
            {activeJobs.map((job,i,arr)=>(
              <div key={job.id} style={{padding:'13px 16px',
                borderBottom:i<arr.length-1?`1px solid ${C.border2}`:'none',
                display:'flex',alignItems:'center',gap:12}}>
                <Avatar name={job.client}/>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:14,fontWeight:500,color:C.text,marginBottom:2}}>{job.client}</p>
                  <p style={{fontSize:12,color:C.muted}}>{job.trade} · {job.start}</p>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <p style={{fontSize:14,fontWeight:600,color:C.green,marginBottom:4}}>{fmt$(job.value)}</p>
                  <Badge s={job.status}/>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function Leads({data,setData}){
  const [showAdd,setShowAdd]=useState(false);
  const [filter,setFilter]=useState('All');
  const blank={name:'',phone:'',trade:'Roofing',source:'Facebook',status:'New',value:'',notes:'',address:''};
  const [form,setForm]=useState(blank);

  const trades=['Roofing','Plumbing','HVAC','Electrical','Concrete','Framing','Painting','Landscaping','General','Other'];
  const sources=['Facebook','Referral','Google','Door Knock','Nextdoor','Other'];
  const statuses=['New','Contacted','Quoted','Won','Lost'];

  const filtered=filter==='All'?data.leads:data.leads.filter(l=>l.status===filter);

  const add=()=>{
    if(!form.name.trim())return;
    const next={...data,leads:[...data.leads,{...form,id:uid(),value:parseFloat(form.value)||0,created:today()}]};
    setData(next);save(next);setForm(blank);setShowAdd(false);
  };

  const setStatus=(id,status)=>{
    const next={...data,leads:data.leads.map(l=>l.id===id?{...l,status}:l)};
    setData(next);save(next);
  };

  const del=(id)=>{
    if(!confirm('Delete this lead?'))return;
    const next={...data,leads:data.leads.filter(l=>l.id!==id)};
    setData(next);save(next);
  };

  return(
    <div>
      <div className="fu" style={{display:'flex',justifyContent:'space-between',
        alignItems:'flex-start',marginBottom:20}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:600,color:C.text,letterSpacing:'-0.02em'}}>Leads</h1>
          <p style={{fontSize:13,color:C.muted,marginTop:2}}>{data.leads.length} total</p>
        </div>
        <Btn onClick={()=>setShowAdd(true)}>+ Add lead</Btn>
      </div>

      <div className="fu1" style={{display:'flex',gap:6,marginBottom:16,overflowX:'auto',paddingBottom:4}}>
        {['All',...statuses].map(f=>(
          <button key={f} onClick={()=>setFilter(f)}
            style={{background:filter===f?C.accent:C.white,
              color:filter===f?C.white:C.muted,
              border:`1px solid ${filter===f?C.accent:C.border}`,
              borderRadius:20,padding:'5px 14px',fontSize:12,fontWeight:500,
              fontFamily:'inherit',cursor:'pointer',whiteSpace:'nowrap',
              transition:'all 0.15s'}}>
            {f}
          </button>
        ))}
      </div>

      <div className="fu2">
        {filtered.length===0&&(
          <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:12,
            padding:32,textAlign:'center',color:C.muted,fontSize:14}}>
            No leads yet. Add your first one.
          </div>
        )}
        <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:12,overflow:'hidden'}}>
          {filtered.map((lead,i,arr)=>(
            <div key={lead.id} style={{padding:'14px 16px',
              borderBottom:i<arr.length-1?`1px solid ${C.border2}`:'none'}}>
              <div style={{display:'flex',alignItems:'flex-start',gap:12,marginBottom:10}}>
                <Avatar name={lead.name}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                    <div>
                      <p style={{fontSize:14,fontWeight:500,color:C.text,marginBottom:2}}>{lead.name}</p>
                      <p style={{fontSize:12,color:C.muted}}>{lead.phone} · {lead.trade}</p>
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      <p style={{fontSize:15,fontWeight:600,color:C.text,marginBottom:4}}>{fmt$(lead.value)}</p>
                      <Badge s={lead.status}/>
                    </div>
                  </div>
                </div>
              </div>

              {lead.address&&(
                <p style={{fontSize:12,color:C.muted,marginBottom:6,
                  paddingLeft:48}}>📍 {lead.address}</p>
              )}
              {lead.notes&&(
                <p style={{fontSize:12,color:C.muted,marginBottom:10,paddingLeft:48,
                  background:C.bg,padding:'8px 12px',borderRadius:6,marginLeft:48,
                  lineHeight:1.5}}>{lead.notes}</p>
              )}

              <div style={{display:'flex',gap:6,flexWrap:'wrap',paddingLeft:48}}>
                {statuses.filter(s=>s!==lead.status).map(s=>(
                  <button key={s} onClick={()=>setStatus(lead.id,s)}
                    style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,
                      padding:'4px 10px',color:C.muted,fontSize:11,fontWeight:500,
                      fontFamily:'inherit',cursor:'pointer',transition:'all 0.15s'}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor=C.accent;e.currentTarget.style.color=C.accent;}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.muted;}}>
                    {s}
                  </button>
                ))}
                <button onClick={()=>del(lead.id)}
                  style={{background:'none',border:'none',color:C.soft,fontSize:11,
                    fontFamily:'inherit',cursor:'pointer',marginLeft:'auto',padding:'4px 4px'}}
                  onMouseEnter={e=>e.currentTarget.style.color=C.red}
                  onMouseLeave={e=>e.currentTarget.style.color=C.soft}>
                  Delete
                </button>
              </div>
            </div>
          ))}
        </div>
      </div>

      {showAdd&&(
        <Modal title="New lead" onClose={()=>setShowAdd(false)}>
          <Inp label="Full name" value={form.name} onChange={v=>setForm({...form,name:v})} placeholder="Client name"/>
          <Inp label="Phone number" value={form.phone} onChange={v=>setForm({...form,phone:v})} placeholder="479-555-0000" type="tel"/>
          <Inp label="Address" value={form.address} onChange={v=>setForm({...form,address:v})} placeholder="Job site address"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Sel label="Trade" value={form.trade} onChange={v=>setForm({...form,trade:v})} options={trades}/>
            <Sel label="Source" value={form.source} onChange={v=>setForm({...form,source:v})} options={sources}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Sel label="Status" value={form.status} onChange={v=>setForm({...form,status:v})} options={statuses}/>
            <Inp label="Est. value" value={form.value} onChange={v=>setForm({...form,value:v})} placeholder="$0" type="number"/>
          </div>
          <div style={{marginBottom:20}}>
            <label style={{display:'block',fontSize:12,fontWeight:500,color:C.text,marginBottom:5}}>Notes</label>
            <textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}
              placeholder="Scope, timeline, anything important..."
              style={{width:'100%',minHeight:80,background:C.white,border:`1px solid ${C.border}`,
                borderRadius:8,padding:'9px 12px',color:C.text,fontSize:14,
                fontFamily:'inherit',outline:'none',resize:'vertical',lineHeight:1.5}}
              onFocus={e=>e.target.style.borderColor=C.blue}
              onBlur={e=>e.target.style.borderColor=C.border}/>
          </div>
          <Btn onClick={add} style={{width:'100%',justifyContent:'center',padding:'11px'}}>Save lead</Btn>
        </Modal>
      )}
    </div>
  );
}

function Jobs({data,setData}){
  const [showAdd,setShowAdd]=useState(false);
  const blank={client:'',trade:'Roofing',status:'Scheduled',value:'',start:today(),address:'',notes:''};
  const [form,setForm]=useState(blank);
  const trades=['Roofing','Plumbing','HVAC','Electrical','Concrete','Framing','Painting','Landscaping','General','Other'];
  const statuses=['Scheduled','In Progress','Complete','On Hold'];

  const add=()=>{
    if(!form.client.trim())return;
    const next={...data,jobs:[...data.jobs,{...form,id:uid(),value:parseFloat(form.value)||0}]};
    setData(next);save(next);setForm(blank);setShowAdd(false);
  };

  const setStatus=(id,status)=>{
    const next={...data,jobs:data.jobs.map(j=>j.id===id?{...j,status}:j)};
    setData(next);save(next);
  };

  const total=data.jobs.reduce((a,j)=>a+(j.value||0),0);

  return(
    <div>
      <div className="fu" style={{display:'flex',justifyContent:'space-between',
        alignItems:'flex-start',marginBottom:20}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:600,color:C.text,letterSpacing:'-0.02em'}}>Jobs</h1>
          <p style={{fontSize:13,color:C.muted,marginTop:2}}>{data.jobs.length} jobs · {fmt$(total)}</p>
        </div>
        <Btn onClick={()=>setShowAdd(true)}>+ Add job</Btn>
      </div>

      <div className="fu1">
        {data.jobs.length===0&&(
          <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:12,
            padding:32,textAlign:'center',color:C.muted,fontSize:14}}>No jobs yet.</div>
        )}
        <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:12,overflow:'hidden'}}>
          {data.jobs.map((job,i,arr)=>(
            <div key={job.id} style={{padding:'14px 16px',
              borderBottom:i<arr.length-1?`1px solid ${C.border2}`:'none'}}>
              <div style={{display:'flex',alignItems:'flex-start',gap:12,marginBottom:8}}>
                <Avatar name={job.client}/>
                <div style={{flex:1}}>
                  <div style={{display:'flex',justifyContent:'space-between',gap:8}}>
                    <div>
                      <p style={{fontSize:14,fontWeight:500,color:C.text,marginBottom:2}}>{job.client}</p>
                      <p style={{fontSize:12,color:C.muted}}>{job.trade} · Start {job.start}</p>
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      <p style={{fontSize:15,fontWeight:600,color:C.green,marginBottom:4}}>{fmt$(job.value)}</p>
                      <Badge s={job.status}/>
                    </div>
                  </div>
                </div>
              </div>
              {job.address&&<p style={{fontSize:12,color:C.muted,marginBottom:6,paddingLeft:48}}>📍 {job.address}</p>}
              {job.notes&&<p style={{fontSize:12,color:C.muted,paddingLeft:48,marginBottom:8,lineHeight:1.5}}>{job.notes}</p>}
              <div style={{display:'flex',gap:6,paddingLeft:48}}>
                {statuses.filter(s=>s!==job.status).map(s=>(
                  <button key={s} onClick={()=>setStatus(job.id,s)}
                    style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,
                      padding:'4px 10px',color:C.muted,fontSize:11,fontWeight:500,
                      fontFamily:'inherit',cursor:'pointer'}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor=C.accent;e.currentTarget.style.color=C.accent;}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.muted;}}>
                    {s}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>

      {showAdd&&(
        <Modal title="New job" onClose={()=>setShowAdd(false)}>
          <Inp label="Client name" value={form.client} onChange={v=>setForm({...form,client:v})} placeholder="Client name"/>
          <Inp label="Address" value={form.address} onChange={v=>setForm({...form,address:v})} placeholder="Job site address"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Sel label="Trade" value={form.trade} onChange={v=>setForm({...form,trade:v})} options={trades}/>
            <Sel label="Status" value={form.status} onChange={v=>setForm({...form,status:v})} options={statuses}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Inp label="Value" value={form.value} onChange={v=>setForm({...form,value:v})} placeholder="$0" type="number"/>
            <Inp label="Start date" value={form.start} onChange={v=>setForm({...form,start:v})} type="date"/>
          </div>
          <div style={{marginBottom:20}}>
            <label style={{display:'block',fontSize:12,fontWeight:500,color:C.text,marginBottom:5}}>Notes</label>
            <textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}
              placeholder="Scope, crew, materials..."
              style={{width:'100%',minHeight:70,background:C.white,border:`1px solid ${C.border}`,
                borderRadius:8,padding:'9px 12px',color:C.text,fontSize:14,
                fontFamily:'inherit',outline:'none',resize:'vertical',lineHeight:1.5}}
              onFocus={e=>e.target.style.borderColor=C.blue}
              onBlur={e=>e.target.style.borderColor=C.border}/>
          </div>
          <Btn onClick={add} style={{width:'100%',justifyContent:'center',padding:'11px'}}>Save job</Btn>
        </Modal>
      )}
    </div>
  );
}

function Invoices({data,setData}){
  const [showAdd,setShowAdd]=useState(false);
  const blank={client:'',amount:'',status:'Draft',due:'',created:today()};
  const [form,setForm]=useState(blank);
  const statuses=['Draft','Sent','Paid','Overdue'];

  const paid=data.invoices.filter(i=>i.status==='Paid').reduce((a,i)=>a+(i.amount||0),0);
  const owed=data.invoices.filter(i=>i.status==='Sent'||i.status==='Overdue').reduce((a,i)=>a+(i.amount||0),0);

  const add=()=>{
    if(!form.client.trim())return;
    const next={...data,invoices:[...data.invoices,{...form,id:uid(),amount:parseFloat(form.amount)||0}]};
    setData(next);save(next);setForm(blank);setShowAdd(false);
  };

  const setStatus=(id,status)=>{
    const next={...data,invoices:data.invoices.map(i=>i.id===id?{...i,status}:i)};
    setData(next);save(next);
  };

  return(
    <div>
      <div className="fu" style={{display:'flex',justifyContent:'space-between',
        alignItems:'flex-start',marginBottom:20}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:600,color:C.text,letterSpacing:'-0.02em'}}>Invoices</h1>
          <p style={{fontSize:13,color:C.muted,marginTop:2}}>{fmt$(owed)} owed · {fmt$(paid)} collected</p>
        </div>
        <Btn onClick={()=>setShowAdd(true)}>+ Create</Btn>
      </div>

      <div className="fu1" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}}>
        {[{label:'Outstanding',val:fmt$(owed),color:C.amber},{label:'Collected',val:fmt$(paid),color:C.green}].map(s=>(
          <div key={s.label} style={{background:C.white,border:`1px solid ${C.border}`,
            borderRadius:12,padding:'14px 16px'}}>
            <p style={{fontSize:11,fontWeight:500,color:C.muted,letterSpacing:'0.02em',
              marginBottom:6}}>{s.label.toUpperCase()}</p>
            <p style={{fontSize:22,fontWeight:600,color:s.color,letterSpacing:'-0.02em'}}>{s.val}</p>
          </div>
        ))}
      </div>

      <div className="fu2">
        <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:12,overflow:'hidden'}}>
          {data.invoices.map((inv,i,arr)=>(
            <div key={inv.id} style={{padding:'14px 16px',
              borderBottom:i<arr.length-1?`1px solid ${C.border2}`:'none'}}>
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
                <Avatar name={inv.client}/>
                <div style={{flex:1}}>
                  <div style={{display:'flex',justifyContent:'space-between',gap:8}}>
                    <div>
                      <p style={{fontSize:14,fontWeight:500,color:C.text,marginBottom:2}}>{inv.client}</p>
                      <p style={{fontSize:12,color:C.muted}}>
                        Created {inv.created}{inv.due?` · Due ${inv.due}`:''}
                      </p>
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      <p style={{fontSize:16,fontWeight:600,color:C.text,marginBottom:4}}>{fmt$(inv.amount)}</p>
                      <Badge s={inv.status}/>
                    </div>
                  </div>
                </div>
              </div>
              <div style={{display:'flex',gap:6,paddingLeft:48}}>
                {statuses.filter(s=>s!==inv.status).map(s=>(
                  <button key={s} onClick={()=>setStatus(inv.id,s)}
                    style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,
                      padding:'4px 10px',color:C.muted,fontSize:11,fontWeight:500,
                      fontFamily:'inherit',cursor:'pointer'}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor=C.accent;e.currentTarget.style.color=C.accent;}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.muted;}}>
                    {s}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>

      {showAdd&&(
        <Modal title="New invoice" onClose={()=>setShowAdd(false)}>
          <Inp label="Client name" value={form.client} onChange={v=>setForm({...form,client:v})} placeholder="Client name"/>
          <Inp label="Amount" value={form.amount} onChange={v=>setForm({...form,amount:v})} placeholder="$0" type="number"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Sel label="Status" value={form.status} onChange={v=>setForm({...form,status:v})} options={statuses}/>
            <Inp label="Due date" value={form.due} onChange={v=>setForm({...form,due:v})} type="date"/>
          </div>
          <Btn onClick={add} style={{width:'100%',justifyContent:'center',padding:'11px',marginTop:6}}>Create invoice</Btn>
        </Modal>
      )}
    </div>
  );
}

  const NAV=[

    {id:'invoices', label:'Money',  icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="2" y="5" width="16" height="10" rx="1.5" stroke="currentColor" strokeWidth="1.5"/><circle cx="10" cy="10" r="2" stroke="currentColor" strokeWidth="1.5"/></svg>},

  return(

      {/* Header */}
      <div style={{background:C.white,padding:'52px 20px 14px',

              display:'flex',alignItems:'center',justifyContent:'center'}}>

              </svg>
            </div>
            <div>
              <p style={{fontSize:10,fontWeight:500,color:C.muted,letterSpacing:'0.06em',
                textTransform:'uppercase',lineHeight:1,marginBottom:1}}>BuildFlow</p>
              <p style={{fontSize:17,fontWeight:600,color:C.text,letterSpacing:'-0.02em',lineHeight:1}}>
                {NAV.find(n=>n.id===screen)?.label}
              </p>
            </div>
          </div>
          <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,
            padding:'4px 10px',fontSize:11,color:C.muted,fontWeight:500}}>
            NWA Pro
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:'auto',padding:'20px 16px 100px',
        WebkitOverflowScrolling:'touch'}}>
        {screen==='dashboard'&&<Dashboard data={data}/>}
        {screen==='leads'    &&<Leads     data={data} setData={setData}/>}
        {screen==='jobs'     &&<Jobs      data={data} setData={setData}/>}
        {screen==='invoices' &&<Invoices  data={data} setData={setData}/>}
      </div>

      {/* Bottom Nav */}
      <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',
        width:'100%',maxWidth:430,background:C.white,
        borderTop:`1px solid ${C.border}`,display:'flex',
        padding:'10px 0 28px',zIndex:10}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setScreen(n.id)}
            style={{flex:1,background:'none',border:'none',cursor:'pointer',
              display:'flex',flexDirection:'column',alignItems:'center',gap:4,
              fontFamily:'inherit',padding:'2px 0',
              color:screen===n.id?C.accent:C.soft,transition:'color 0.15s'}}>
            {n.icon}
            <span style={{fontSize:10,fontWeight:screen===n.id?600:400,letterSpacing:'0.02em'}}>
              {n.label}
            </span>
            {screen===n.id&&<div style={{width:16,height:2,background:C.accent,borderRadius:2}}/>}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
