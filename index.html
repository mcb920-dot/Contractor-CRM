<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="BuildFlow"/>
<title>BuildFlow</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#F9FAFB;}
body{-webkit-font-smoothing:antialiased;font-family:'Inter',system-ui,sans-serif;}
input::placeholder,textarea::placeholder{color:#C1C7D0;}
select{-webkit-appearance:none;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#E2E8F0;border-radius:4px;}
*{-webkit-tap-highlight-color:transparent;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
.fu{animation:fadeUp 0.2s ease forwards;}
.fu1{animation:fadeUp 0.2s 0.04s ease both;}
.fu2{animation:fadeUp 0.2s 0.08s ease both;}
.fu3{animation:fadeUp 0.2s 0.12s ease both;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useCallback} = React;

const SUPA_URL = 'https://gfxmkouojymwgpvbngzz.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmeG1rb3Vvanltd2dwdmJuZ3p6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NDg5ODAsImV4cCI6MjA4OTUyNDk4MH0.kGTwFZcoHnkuFJR-FTk__MuK6KaqUp7A5HNIkQy1EMA';
const supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);

const C={
  bg:'#F9FAFB',white:'#FFFFFF',border:'#E5E7EB',border2:'#F3F4F6',
  text:'#111827',muted:'#6B7280',soft:'#9CA3AF',accent:'#111827',
  blue:'#2563EB',green:'#059669',amber:'#D97706',red:'#DC2626',
  blueBg:'#EFF6FF',greenBg:'#ECFDF5',amberBg:'#FFFBEB',redBg:'#FEF2F2',
};

const fmt$=n=>n>=1000?`$${(n/1000).toFixed(1)}k`:`$${n||0}`;
const today=()=>new Date().toISOString().split('T')[0];

const STATUS={
  'New':{color:C.blue,bg:C.blueBg},'Contacted':{color:'#7C3AED',bg:'#F5F3FF'},
  'Quoted':{color:C.amber,bg:C.amberBg},'Won':{color:C.green,bg:C.greenBg},
  'Lost':{color:C.red,bg:C.redBg},'In Progress':{color:C.blue,bg:C.blueBg},
  'Scheduled':{color:'#7C3AED',bg:'#F5F3FF'},'Complete':{color:C.green,bg:C.greenBg},
  'On Hold':{color:C.amber,bg:C.amberBg},'Draft':{color:C.muted,bg:C.border2},
  'Sent':{color:C.amber,bg:C.amberBg},'Paid':{color:C.green,bg:C.greenBg},
  'Overdue':{color:C.red,bg:C.redBg},
};

const Badge=({s})=>{const st=STATUS[s]||{color:C.muted,bg:C.border2};return(
  <span style={{background:st.bg,color:st.color,fontSize:11,fontWeight:600,
    padding:'3px 8px',borderRadius:20,display:'inline-block'}}>{s}</span>
);};

const Avatar=({name})=>{
  const initials=(name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const cols=[['#DBEAFE','#1D4ED8'],['#D1FAE5','#065F46'],['#FEF3C7','#92400E'],
              ['#FCE7F3','#9D174D'],['#EDE9FE','#5B21B6'],['#FFEDD5','#9A3412']];
  const pick=cols[(name||'A').charCodeAt(0)%cols.length];
  return <div style={{width:36,height:36,borderRadius:'50%',background:pick[0],flexShrink:0,
    display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:600,color:pick[1]}}>{initials}</div>;
};

const Spinner=()=><div style={{width:18,height:18,border:`2px solid ${C.border}`,
  borderTop:`2px solid ${C.accent}`,borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/>;

const Inp=({label,value,onChange,placeholder,type='text',style:sx={},onKeyDown})=>(
  <div style={{marginBottom:14}}>
    {label&&<label style={{display:'block',fontSize:12,fontWeight:500,color:C.text,marginBottom:5}}>{label}</label>}
    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      style={{width:'100%',background:C.white,border:`1px solid ${C.border}`,borderRadius:8,
        padding:'9px 12px',color:C.text,fontSize:14,fontFamily:'inherit',outline:'none',...sx}}
      onFocus={e=>e.target.style.borderColor=C.blue}
      onBlur={e=>e.target.style.borderColor=C.border}
      onKeyDown={onKeyDown}/>
  </div>
);

const Sel=({label,value,onChange,options})=>(
  <div style={{marginBottom:14}}>
    {label&&<label style={{display:'block',fontSize:12,fontWeight:500,color:C.text,marginBottom:5}}>{label}</label>}
    <div style={{position:'relative'}}>
      <select value={value} onChange={e=>onChange(e.target.value)}
        style={{width:'100%',background:C.white,border:`1px solid ${C.border}`,borderRadius:8,
          padding:'9px 32px 9px 12px',color:C.text,fontSize:14,fontFamily:'inherit',outline:'none',cursor:'pointer'}}>
        {options.map(o=><option key={o}>{o}</option>)}
      </select>
      <div style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',
        pointerEvents:'none',color:C.muted,fontSize:10}}>▾</div>
    </div>
  </div>
);

const Btn=({onClick,children,variant='primary',loading=false,style:sx={}})=>(
  <button onClick={onClick} disabled={loading}
    style={{background:variant==='primary'?C.accent:C.white,
      color:variant==='primary'?C.white:C.text,
      border:variant==='primary'?'none':`1px solid ${C.border}`,
      borderRadius:8,padding:'9px 16px',fontSize:13,fontWeight:500,
      fontFamily:'inherit',cursor:loading?'not-allowed':'pointer',
      opacity:loading?0.7:1,display:'inline-flex',alignItems:'center',
      justifyContent:'center',gap:8,...sx}}>
    {loading?<Spinner/>:children}
  </button>
);

function Modal({title,onClose,children}){
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.3)',zIndex:100,
      display:'flex',alignItems:'flex-end',justifyContent:'center'}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:C.white,borderRadius:'16px 16px 0 0',width:'100%',maxWidth:480,
        padding:'20px 20px 100px',animation:'slideUp 0.2s ease',
        maxHeight:'90vh',overflowY:'auto',borderTop:`1px solid ${C.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <span style={{fontSize:16,fontWeight:600,color:C.text}}>{title}</span>
          <button onClick={onClose} style={{background:'none',border:'none',
            color:C.muted,fontSize:20,cursor:'pointer',lineHeight:1}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function AuthScreen({onAuth}){

  const [email,setEmail]=useState('');
  const [password,setPassword]=useState('');
  const [name,setName]=useState('');
  const [biz,setBiz]=useState('');

  const [error,setError]=useState('');
  const [success,setSuccess]=useState('');

  const submit=async()=>{
    setError('');setLoading(true);
    if(mode==='login'){
      const{error:e}=await supabase.auth.signInWithPassword({email,password});
      if(e)setError(e.message);
    } else {
      const{data,error:e}=await supabase.auth.signUp({
        email,password,
        options:{data:{full_name:name,business_name:biz}}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({leads,jobs,invoices,profile}){
  const pipeline=leads.filter(l=>l.status!=='Lost').reduce((a,l)=>a+(l.value||0),0);
  const collected=invoices.filter(i=>i.status==='Paid').reduce((a,i)=>a+(i.amount||0),0);
  const owed=invoices.filter(i=>i.status==='Sent'||i.status==='Overdue').reduce((a,i)=>a+(i.amount||0),0);
  const activeJobs=jobs.filter(j=>j.status==='In Progress'||j.status==='Scheduled');
  const newLeads=leads.filter(l=>l.status==='New').length;

  return(
    <div>
      <div className="fu" style={{marginBottom:20}}>
        <p style={{fontSize:13,color:C.muted,marginBottom:2}}>
          {new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
        </p>
        <h1 style={{fontSize:22,fontWeight:600,color:C.text,letterSpacing:'-0.02em'}}>
          {profile?.business_name||'Dashboard'}
        </h1>
        {newLeads>0&&(
          <div style={{display:'inline-flex',alignItems:'center',gap:6,marginTop:8,
            background:C.blueBg,border:`1px solid #BFDBFE`,borderRadius:20,padding:'4px 12px'}}>
            <div style={{width:6,height:6,borderRadius:'50%',background:C.blue}}/>
            <span style={{fontSize:12,color:C.blue,fontWeight:500}}>{newLeads} new lead{newLeads>1?'s':''} waiting</span>
          </div>
        )}
      </div>

      <div className="fu1" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}}>
        {[
          {label:'Pipeline',value:fmt$(pipeline),sub:`${leads.length} leads`},
          {label:'Active jobs',value:activeJobs.length,sub:'in progress'},
          {label:'Awaiting payment',value:fmt$(owed),sub:'outstanding'},
          {label:'Collected',value:fmt$(collected),sub:'total paid'},
        ].map(s=>(
          <div key={s.label} style={{background:C.white,borderRadius:12,padding:'14px 16px',
            border:`1px solid ${C.border}`}}>
            <p style={{fontSize:11,color:C.muted,fontWeight:500,marginBottom:6,letterSpacing:'0.02em'}}>
              {s.label.toUpperCase()}
            </p>
            <p style={{fontSize:20,fontWeight:600,color:C.text,letterSpacing:'-0.02em',marginBottom:2}}>
              {s.value}

// NOW RECEIVES setJobs so Won leads auto-create a job
function Leads({leads,setLeads,setJobs,userId}){
  const [showAdd,setShowAdd]=useState(false);
  const [filter,setFilter]=useState('All');
  const [loading,setLoading]=useState(false);
  const blank={name:'',phone:'',email:'',trade:'Roofing',source:'Facebook',status:'New',value:'',notes:'',address:''};
  const [form,setForm]=useState(blank);

  const trades=['Roofing','Plumbing','HVAC','Electrical','Concrete','Framing','Painting','Landscaping','General','Other'];
  const sources=['Facebook','Referral','Google','Door Knock','Nextdoor','Other'];
  const statuses=['New','Contacted','Quoted','Won','Lost'];
  const filtered=filter==='All'?leads:leads.filter(l=>l.status===filter);

  const add=async()=>{
    if(!form.name.trim())return;
    setLoading(true);
    const{data,error}=await supabase.from('leads').insert({
      ...form,value:parseFloat(form.value)||0,user_id:userId
    }).select().single();
    if(!error)setLeads(prev=>[...prev,data]);
    setForm(blank);setShowAdd(false);setLoading(false);
  };

  // KEY CHANGE: when status flips to Won, auto-create a Job
  const updateStatus=async(id,status)=>{
    const lead=leads.find(l=>l.id===id);
    if(!lead || lead.status===status) return; // guard: no-op if already this status
    await supabase.from('leads').update({status}).eq('id',id);
    setLeads(prev=>prev.map(l=>l.id===id?{...l,status}:l));

    if(status==='Won'){
      if(lead){
        const newJob={
          client: lead.name,
          trade:  lead.trade,
          status: 'Scheduled',
          value:  lead.value||0,
          start_date: today(),
          address: lead.address||'',
          notes:  lead.notes||'',
          user_id: userId,
        };
        const{data:jobData,error:jobErr}=await supabase.from('jobs').insert(newJob).select().single();
        if(jobErr){
          console.error('Job creation failed:', jobErr.message);
        } else if(jobData){
          setJobs(prev=>[jobData,...prev]);
        }
      }
    }
  };

  const del=async(id)=>{
    if(!confirm('Delete this lead?'))return;
    await supabase.from('leads').delete().eq('id',id);
    setLeads(prev=>prev.filter(l=>l.id!==id));
  };

  return(
    <div>
      <div className="fu" style={{display:'flex',justifyContent:'space-between',
        alignItems:'flex-start',marginBottom:20}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:600,color:C.text,letterSpacing:'-0.02em'}}>Leads</h1>
          <p style={{fontSize:13,color:C.muted,marginTop:2}}>{leads.length} total</p>
        </div>
        <Btn onClick={()=>setShowAdd(true)}>+ Add lead</Btn>
      </div>

      <div className="fu1" style={{display:'flex',gap:6,marginBottom:16,overflowX:'auto',paddingBottom:4}}>
        {['All',...statuses].map(f=>(
          <button key={f} onClick={()=>setFilter(f)}
            style={{background:filter===f?C.accent:C.white,color:filter===f?C.white:C.muted,
              border:`1px solid ${filter===f?C.accent:C.border}`,borderRadius:20,
              padding:'5px 14px',fontSize:12,fontWeight:500,fontFamily:'inherit',
              cursor:'pointer',whiteSpace:'nowrap'}}>
            {f}
          </button>
        ))}
      </div>

      <div className="fu2" style={{background:C.white,border:`1px solid ${C.border}`,
        borderRadius:12,overflow:'hidden'}}>
        {filtered.length===0&&(
          <div style={{padding:32,textAlign:'center',color:C.muted,fontSize:14}}>
            No leads yet. Add your first one.
          </div>
        )}
        {filtered.map((lead,i,arr)=>(
          <div key={lead.id} style={{padding:'14px 16px',
            borderBottom:i<arr.length-1?`1px solid ${C.border2}`:'none'}}>
            <div style={{display:'flex',alignItems:'flex-start',gap:12,marginBottom:8}}>
              <Avatar name={lead.name}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',justifyContent:'space-between',gap:8}}>
                  <div>
                    <p style={{fontSize:14,fontWeight:500,color:C.text,marginBottom:2}}>{lead.name}</p>
                    <p style={{fontSize:12,color:C.muted}}>
                      <a href={`tel:${lead.phone}`} style={{color:C.blue,textDecoration:'none'}}>{lead.phone}</a>
                      {lead.email&&<> · <a href={`mailto:${lead.email}`} style={{color:C.blue,textDecoration:'none'}}>{lead.email}</a></>}
                      {' · '}{lead.trade}
                    </p>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <p style={{fontSize:15,fontWeight:600,color:C.text,marginBottom:4}}>{fmt$(lead.value)}</p>
                    <Badge s={lead.status}/>
                  </div>
                </div>
              </div>
            </div>
            {lead.address&&<p style={{fontSize:12,color:C.muted,marginBottom:6,paddingLeft:48}}>📍 {lead.address}</p>}
            {lead.notes&&<div style={{fontSize:12,color:C.muted,marginBottom:8,paddingLeft:48,
              background:C.bg,padding:'8px 12px',borderRadius:6,marginLeft:48,lineHeight:1.5}}>{lead.notes}</div>}
            <div style={{display:'flex',gap:6,flexWrap:'wrap',paddingLeft:48,alignItems:'center'}}>
              {statuses.filter(s=>s!==lead.status).map(s=>(
                <button key={s} onClick={()=>updateStatus(lead.id,s)}
                  style={{background:s==='Won'?C.greenBg:C.bg,
                    border:`1px solid ${s==='Won'?C.green:C.border}`,borderRadius:6,
                    padding:'4px 10px',
                    color:s==='Won'?C.green:C.muted,fontSize:11,fontWeight:s==='Won'?600:500,
                    fontFamily:'inherit',cursor:'pointer'}}>
                  {s==='Won'?'✓ Won':s}
                </button>
              ))}
              <button onClick={()=>del(lead.id)}
                style={{background:'none',border:'none',color:C.soft,fontSize:11,
                  fontFamily:'inherit',cursor:'pointer',marginLeft:'auto'}}
                onMouseEnter={e=>e.currentTarget.style.color=C.red}
                onMouseLeave={e=>e.currentTarget.style.color=C.soft}>
                Delete
              </button>
            </div>
          </div>
        ))}
      </div>

      {showAdd&&(
        <Modal title="New lead" onClose={()=>setShowAdd(false)}>
          <Inp label="Full name" value={form.name} onChange={v=>setForm({...form,name:v})} placeholder="Client name"/>
          <Inp label="Phone" value={form.phone} onChange={v=>setForm({...form,phone:v})} placeholder="479-555-0000" type="tel"/>
          <Inp label="Email" value={form.email} onChange={v=>setForm({...form,email:v})} placeholder="client@email.com" type="email"/>
          <Inp label="Address" value={form.address} onChange={v=>setForm({...form,address:v})} placeholder="Job site address"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Sel label="Trade" value={form.trade} onChange={v=>setForm({...form,trade:v})} options={trades}/>
            <Sel label="Source" value={form.source} onChange={v=>setForm({...form,source:v})} options={sources}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Sel label="Status" value={form.status} onChange={v=>setForm({...form,status:v})} options={statuses}/>
            <Inp label="Est. value" value={form.value} onChange={v=>setForm({...form,value:v})} placeholder="$0" type="number"/>
          </div>
          <div style={{marginBottom:20}}>
            <label style={{display:'block',fontSize:12,fontWeight:500,color:C.text,marginBottom:5}}>Notes</label>
            <textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}
              placeholder="Scope, timeline, anything important..."
              style={{width:'100%',minHeight:80,background:C.white,border:`1px solid ${C.border}`,
                borderRadius:8,padding:'9px 12px',color:C.text,fontSize:14,
                fontFamily:'inherit',outline:'none',resize:'vertical',lineHeight:1.5}}/>
          </div>
          <Btn onClick={add} loading={loading} style={{width:'100%',padding:'11px'}}>Save lead</Btn>
        </Modal>
      )}
    </div>
  );
}

  const owed=invoices.filter(i=>i.status==='Sent'||i.status==='Overdue').reduce((a,i)=>a+(i.amount||0),0);

    if(!form.client.trim())return;

// ── PUBLIC LEAD CAPTURE FORM ──────────────────────────────────────────────────
function LeadCaptureForm({slug}){
  const [profile,setProfile]=useState(null);
  const [loading,setLoading]=useState(true);
  const [submitted,setSubmitted]=useState(false);
  const [saving,setSaving]=useState(false);
  const [form,setForm]=useState({name:'',phone:'',email:'',address:'',trade:'Roofing',notes:''});
  const trades=['Roofing','Plumbing','HVAC','Electrical','Concrete','Framing','Painting','Landscaping','General','Other'];

  useEffect(()=>{
    supabase.from('profiles').select('*').eq('slug',slug).single()
      .then(({data})=>{setProfile(data);setLoading(false);});
  },[slug]);

  const submit=async()=>{
    if(!form.name.trim()||!form.phone.trim())return;
    setSaving(true);
    await supabase.from('leads').insert({
      ...form,user_id:profile.id,source:'Web Form',status:'New'
    });
    setSaving(false);setSubmitted(true);
  };

  if(loading)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:C.white}}>
      <Spinner/>
    </div>
  );

  if(!profile)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',
      background:C.white,padding:24,textAlign:'center'}}>

function App(){
  const [session,setSession]=useState(null);
  const [profile,setProfile]=useState(null);
  const [leads,setLeads]=useState([]);
  const [jobs,setJobs]=useState([]);
  const [invoices,setInvoices]=useState([]);
  const [screen,setScreen]=useState('dashboard');
  const [loading,setLoading]=useState(true);

  const path=window.location.pathname;
  const quoteMatch=path.match(/^\/quote\/(.+)/);

  useEffect(()=>{
    if(quoteMatch) return;
    supabase.auth.getSession().then(({data:{session}})=>{
      setSession(session);
      if(session) loadData(session.user.id);
      else setLoading(false);
    });
    const{data:{subscription}}=supabase.auth.onAuthStateChange((event,session)=>{
      if(event==='INITIAL_SESSION') return; // skip — already handled by getSession above
      setSession(session);
      if(session)loadData(session.user.id);
      else{setLoading(false);setLeads([]);setJobs([]);setInvoices([]);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  const loadData=async(uid)=>{
    setLoading(true);
    const[p,l,j,i]=await Promise.all([
      supabase.from('profiles').select('*').eq('id',uid).maybeSingle(),
      supabase.from('leads').select('*').eq('user_id',uid).order('created_at',{ascending:false}),
      supabase.from('jobs').select('*').eq('user_id',uid).order('created_at',{ascending:false}),
      supabase.from('invoices').select('*').eq('user_id',uid).order('created_at',{ascending:false}),
    ]);
    setProfile(p?.data);
    setLeads(l?.data||[]);
    setJobs(j?.data||[]);
    setInvoices(i?.data||[]);
    setLoading(false);
  };

  const signOut=async()=>{await supabase.auth.signOut();setScreen('dashboard');};

  if(quoteMatch)return <LeadCaptureForm slug={quoteMatch[1]}/>;

  if(loading)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:C.white}}>
      <div style={{textAlign:'center'}}>
        <Spinner/>
        <p style={{fontSize:13,color:C.muted,marginTop:12}}>Loading...</p>
      </div>
    </div>
  );

  if(!session)return <AuthScreen onAuth={()=>{}}/>;

  const NAV=[
    {id:'dashboard',label:'Home',   icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="11" y="2" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="2" y="11" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="11" y="11" width="7" height="7" rx="1.5" fill="currentColor"/></svg>},
    {id:'leads',    label:'Leads',  icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="7" r="3.5" stroke="currentColor" strokeWidth="1.5"/><path d="M3 17c0-3.314 3.134-6 7-6s7 2.686 7 6" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>},
    {id:'jobs',     label:'Jobs',   icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="7" width="14" height="10" rx="1.5" stroke="currentColor" strokeWidth="1.5"/><path d="M7 7V5a3 3 0 016 0v2" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>},
    {id:'invoices', label:'Money',  icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="2" y="5" width="16" height="10" rx="1.5" stroke="currentColor" strokeWidth="1.5"/><circle cx="10" cy="10" r="2" stroke="currentColor" strokeWidth="1.5"/></svg>},
  ];

  return(
    <div style={{maxWidth:430,margin:'0 auto',minHeight:'100vh',minHeight:'100dvh',
