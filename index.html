<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#EDF0F5;}
body{-webkit-font-smoothing:antialiased;font-family:'DM Sans',system-ui,sans-serif;}
input::placeholder,textarea::placeholder{color:#C1C7D0;}
select{-webkit-appearance:none;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#E2E8F0;border-radius:4px;}
*{-webkit-tap-highlight-color:transparent;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input,select,textarea,button{font-family:'DM Sans',system-ui,sans-serif;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
.fu{animation:fadeUp 0.2s ease forwards;}
.fu1{animation:fadeUp 0.2s 0.04s ease both;}
.fu2{animation:fadeUp 0.2s 0.08s ease both;}
.fu3{animation:fadeUp 0.2s 0.12s ease both;}
</style>
</head>

const fmt$=n=>n>=1000?`$${(n/1000).toFixed(1)}k`:`$${n||0}`;
const today=()=>new Date().toISOString().split('T')[0];

const STATUS={

);};

  </div>

const Spinner=()=><div style={{width:18,height:18,border:`2px solid ${C.border}`,
  borderTop:`2px solid ${C.accent}`,borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/>;

const Inp=({label,value,onChange,placeholder,type='text',style:sx={},onKeyDown})=>(
  <div style={{marginBottom:14}}>
    {label&&<label style={{display:'block',fontSize:12,fontWeight:500,color:C.text,marginBottom:5}}>{label}</label>}
    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      style={{width:'100%',background:C.white,border:`1px solid ${C.border}`,borderRadius:8,
        padding:'9px 12px',color:C.text,fontSize:14,fontFamily:'inherit',outline:'none',...sx}}
      onFocus={e=>e.target.style.borderColor=C.blue}
      onBlur={e=>e.target.style.borderColor=C.border}
      onKeyDown={onKeyDown}/>
  </div>
);

const Sel=({label,value,onChange,options})=>(
  <div style={{marginBottom:14}}>
    {label&&<label style={{display:'block',fontSize:12,fontWeight:500,color:C.text,marginBottom:5}}>{label}</label>}
    <div style={{position:'relative'}}>
      <select value={value} onChange={e=>onChange(e.target.value)}
        style={{width:'100%',background:C.white,border:`1px solid ${C.border}`,borderRadius:8,
          padding:'9px 32px 9px 12px',color:C.text,fontSize:14,fontFamily:'inherit',outline:'none',cursor:'pointer'}}>
        {options.map(o=><option key={o}>{o}</option>)}
      </select>
      <div style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',
        pointerEvents:'none',color:C.muted,fontSize:10}}>▾</div>
    </div>
  </div>
);

const Btn=({onClick,children,variant='primary',loading=false,style:sx={}})=>(
  <button onClick={onClick} disabled={loading}
    style={{background:variant==='primary'?C.accent:C.white,
      color:variant==='primary'?C.white:C.text,
      border:variant==='primary'?'none':`1px solid ${C.border}`,
      borderRadius:12,padding:'10px 20px',fontSize:13,fontWeight:700,letterSpacing:'0.01em',
      fontFamily:'inherit',cursor:loading?'not-allowed':'pointer',
      opacity:loading?0.7:1,display:'inline-flex',alignItems:'center',
      justifyContent:'center',gap:8,
      boxShadow:variant==='primary'?'0 1px 4px rgba(27,79,216,0.3),0 4px 14px rgba(27,79,216,0.18)':'none',
      transition:'opacity 0.15s,box-shadow 0.15s',...sx}}>
    {loading?<Spinner/>:children}
  </button>
);

function Modal({title,onClose,children}){
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.3)',zIndex:100,
      display:'flex',alignItems:'flex-start',justifyContent:'center',
      paddingTop:80,overflowY:'auto'}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:C.white,borderRadius:14,width:'calc(100% - 32px)',maxWidth:480,
        padding:'20px 20px 40px',marginBottom:40}}
        onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <span style={{fontSize:16,fontWeight:600,color:C.text}}>{title}</span>
          <button onClick={onClose} style={{background:'none',border:'none',
            color:C.muted,fontSize:20,cursor:'pointer',lineHeight:1}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

      const{error:e}=await supabase.auth.signInWithPassword({email,password});

      const{data,error:e}=await supabase.auth.signUp({
        email,password,
        options:{data:{full_name:name,business_name:biz}}

function Dashboard({leads,jobs,invoices,profile,onNavigate}){
  const pipeline=leads.filter(l=>l.status!=='Lost').reduce((a,l)=>a+(l.value||0),0);
  const collected=invoices.filter(i=>i.status==='Paid').reduce((a,i)=>a+(i.amount||0),0);
  const owed=invoices.filter(i=>i.status==='Sent'||i.status==='Overdue').reduce((a,i)=>a+(i.amount||0),0);
  const activeJobs=jobs.filter(j=>j.status==='In Progress'||j.status==='Scheduled');
  const newLeads=leads.filter(l=>l.status==='New'&&l.status!=='Won').length;

  return(
    <div>
      <div className="fu" style={{marginBottom:20}}>
        <p style={{fontSize:13,color:C.muted,marginBottom:2}}>
          {new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
        </p>
        <h1 style={{fontSize:24,fontWeight:800,color:C.text,letterSpacing:'-0.03em'}}>
          {profile?.business_name||'Dashboard'}
        </h1>
        {newLeads>0&&(
          <div style={{display:'inline-flex',alignItems:'center',gap:6,marginTop:8,
            background:C.blueBg,border:`1px solid #BFDBFE`,borderRadius:20,padding:'4px 12px'}}>
            <div style={{width:6,height:6,borderRadius:'50%',background:C.blue}}/>
            <span style={{fontSize:12,color:C.blue,fontWeight:500}}>{newLeads} new lead{newLeads>1?'s':''} waiting</span>
          </div>
        )}
      </div>

      <div className="fu1" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}}>
        {[
          {label:'Pipeline',value:fmt$(pipeline),sub:`${leads.length} leads`},
          {label:'Active jobs',value:activeJobs.length,sub:'in progress'},
          {label:'Awaiting payment',value:fmt$(owed),sub:'outstanding'},
          {label:'Collected',value:fmt$(collected),sub:'total paid'},
        ].map(s=>(
          <div key={s.label} style={{background:C.white,borderRadius:12,padding:'14px 16px',
            border:`1px solid ${C.border}`,boxShadow:'0 2px 6px rgba(0,0,0,0.07),0 8px 20px rgba(0,0,0,0.10)'}}>
            <p style={{fontSize:10,color:C.muted,fontWeight:700,marginBottom:6,letterSpacing:'0.08em'}}>
              {s.label.toUpperCase()}
            </p>
            <p style={{fontSize:24,fontWeight:800,color:C.text,letterSpacing:'-0.04em',marginBottom:2}}>
              {s.value}
            </p>
            <p style={{fontSize:11,color:C.soft}}>{s.sub}</p>
          </div>
        ))}
      </div>

      {profile?.slug&&(()=>{
        const [copied,setCopied]=useState(false);
        const url=`${window.location.origin}/quote/${profile.slug}`;
        const copy=()=>{navigator.clipboard.writeText(url).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});};
        return(
        <div className="fu2" style={{background:C.white,border:`1px solid ${C.border}`,
          borderRadius:12,padding:'14px 16px',marginBottom:16,boxShadow:'0 2px 6px rgba(0,0,0,0.07),0 8px 20px rgba(0,0,0,0.10)'}}>
          <p style={{fontSize:12,fontWeight:500,color:C.muted,textTransform:'uppercase',
            letterSpacing:'0.04em',marginBottom:8}}>Your Lead Capture Link</p>
          <div style={{background:C.bg,borderRadius:8,padding:'9px 12px',marginBottom:10,
            fontSize:12,color:C.blue,wordBreak:'break-all',fontFamily:'monospace'}}>
            {url}
          </div>
          <div style={{display:'flex',gap:8}}>
            <Btn onClick={copy} style={{flex:1,padding:'8px',fontSize:12}}>
              {copied?'Copied!':'Copy Link'}
            </Btn>
          </div>
          <p style={{fontSize:12,color:C.muted,marginTop:8}}>Share this link — customers fill it out and leads appear here instantly.</p>
        </div>
        );
      })()}

      {leads.filter(l=>l.status!=='Won'&&l.status!=='Lost').slice(-3).reverse().length>0&&(
        <div className="fu3">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <p style={{fontSize:12,fontWeight:500,color:C.muted,letterSpacing:'0.04em',
              textTransform:'uppercase'}}>Recent Leads</p>
            <button onClick={()=>onNavigate('leads')} style={{background:'none',border:'none',
              fontSize:12,color:C.blue,fontFamily:'inherit',cursor:'pointer',fontWeight:500}}>
              View all →
            </button>
          </div>
          <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:16,overflow:'hidden',boxShadow:'0 2px 6px rgba(0,0,0,0.07),0 8px 20px rgba(0,0,0,0.10)'}}>
            {leads.filter(l=>l.status!=='Won'&&l.status!=='Lost').slice(-3).reverse().map((lead,i,arr)=>(
              <div key={lead.id} onClick={()=>onNavigate('leads')} style={{padding:'13px 16px',
                borderBottom:i<arr.length-1?`1px solid ${C.border2}`:'none',
                display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}
                onMouseEnter={e=>e.currentTarget.style.background='#F9FAFB'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <Avatar name={lead.name}/>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:14,fontWeight:500,color:C.text,marginBottom:2,
                    whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{lead.name}</p>
                  <p style={{fontSize:12,color:C.muted}}>{lead.trade} · {lead.source}</p>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <p style={{fontSize:14,fontWeight:600,color:C.text,marginBottom:4}}>{fmt$(lead.value)}</p>

}

function Leads({leads,setLeads,setJobs,userId}){
  const [showAdd,setShowAdd]=useState(false);
  const [filter,setFilter]=useState('All');
  const [loading,setLoading]=useState(false);
  const blank={name:'',phone:'',email:'',trade:'Roofing',source:'Facebook',status:'New',value:'',notes:'',address:''};
  const [form,setForm]=useState(blank);

  const trades=['Roofing','Plumbing','HVAC','Electrical','Concrete','Framing','Painting','Landscaping','General','Other'];
  const sources=['Facebook','Referral','Google','Door Knock','Nextdoor','Other'];
  const statuses=['New','Contacted','Quoted','Won','Lost'];
  const activeleads=leads.filter(l=>l.status!=='Won');
  const filtered=filter==='All'?activeleads:activeleads.filter(l=>l.status===filter);

  const add=async()=>{
    if(!form.name.trim())return;
    setLoading(true);
    const{data,error}=await supabase.from('leads').insert({
      ...form,value:parseFloat(form.value)||0,user_id:userId
    }).select().single();
    if(!error)setLeads(prev=>[...prev,data]);
    setForm(blank);setShowAdd(false);setLoading(false);
  };

  const updateStatus=async(id,status)=>{
    const lead=leads.find(l=>l.id===id);
    if(!lead || lead.status===status) return;
    if(status==='Won'){
      const newJob={client:lead.name,trade:lead.trade,status:'Scheduled',value:lead.value||0,start_date:today(),address:lead.address||'',notes:lead.notes||'',user_id:userId};
      const{data:jobData,error:jobErr}=await supabase.from('jobs').insert(newJob).select().single();
      if(jobErr){console.error('Job creation failed:',jobErr.message);return;}
      await supabase.from('leads').update({status:'Won'}).eq('id',id);
      setLeads(prev=>prev.filter(l=>l.id!==id));
      setJobs(prev=>[jobData,...prev]);
    } else {
      await supabase.from('leads').update({status}).eq('id',id);
      setLeads(prev=>prev.map(l=>l.id===id?{...l,status}:l));
    }
  };

  const del=async(id)=>{
    if(!confirm('Delete this lead?'))return;
    await supabase.from('leads').delete().eq('id',id);
    setLeads(prev=>prev.filter(l=>l.id!==id));
  };

  return(
    <div>
      <div className="fu" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
        <div>
          <h1 style={{fontSize:24,fontWeight:800,color:C.text,letterSpacing:'-0.03em'}}>Leads</h1>
          <p style={{fontSize:13,color:C.muted,marginTop:2}}>{activeleads.length} total</p>
        </div>
        <Btn onClick={()=>setShowAdd(true)}>+ Add lead</Btn>
      </div>

      <div className="fu1" style={{display:'flex',gap:6,marginBottom:16,overflowX:'auto',paddingBottom:4}}>
        {['All',...statuses].map(f=>(
          <button key={f} onClick={()=>setFilter(f)}
            style={{background:filter===f?C.accent:C.white,color:filter===f?C.white:C.muted,
              border:`1px solid ${filter===f?C.accent:C.border}`,borderRadius:20,
              padding:'6px 16px',fontSize:12,fontWeight:600,fontFamily:'inherit',
              cursor:'pointer',whiteSpace:'nowrap',boxShadow:filter===f?'0 2px 8px rgba(27,79,216,0.3)':'none'}}>
            {f}
          </button>
        ))}
      </div>

      <div className="fu2" style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:16,overflow:'hidden',boxShadow:'0 2px 6px rgba(0,0,0,0.07),0 8px 20px rgba(0,0,0,0.10)'}}>
        {filtered.length===0&&(
          <div style={{padding:32,textAlign:'center',color:C.muted,fontSize:14}}>No leads yet. Add your first one.</div>
        )}
        {filtered.map((lead,i,arr)=>(
          <div key={lead.id} style={{padding:'14px 16px',borderBottom:i<arr.length-1?`1px solid ${C.border2}`:'none'}}>
            <div style={{display:'flex',alignItems:'flex-start',gap:12,marginBottom:8}}>
              <Avatar name={lead.name}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',justifyContent:'space-between',gap:8}}>
                  <div>
                    <p style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:2}}>{lead.name}</p>
                    <div style={{fontSize:12,color:C.muted,lineHeight:1.6}}>
                      {lead.email&&<div><a href={`mailto:${lead.email}`} style={{color:C.blue,textDecoration:'none'}}>{lead.email}</a></div>}
                      <div><a href={`tel:${lead.phone}`} style={{color:C.blue,textDecoration:'none'}}>{lead.phone}</a>{' · '}{lead.trade}</div>
                    </div>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <p style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:4}}>{fmt$(lead.value)}</p>
                    <Badge s={lead.status}/>
                  </div>
                </div>
              </div>
            </div>
            {lead.address&&<p style={{fontSize:12,color:C.muted,marginBottom:6,paddingLeft:48}}>📍 {lead.address}</p>}
            {lead.notes&&<div style={{fontSize:12,color:C.muted,marginBottom:8,paddingLeft:48,background:C.bg,padding:'8px 12px',borderRadius:6,marginLeft:48,lineHeight:1.5}}>{lead.notes}</div>}
            <div style={{display:'flex',gap:6,flexWrap:'wrap',paddingLeft:48,alignItems:'center'}}>
              {statuses.filter(s=>s!==lead.status).map(s=>(
                <button key={s} onClick={()=>updateStatus(lead.id,s)}
                  style={{background:s==='Won'?C.greenBg:C.bg,border:`1px solid ${s==='Won'?C.green:C.border}`,borderRadius:6,padding:'4px 10px',color:s==='Won'?C.green:C.muted,fontSize:11,fontWeight:s==='Won'?600:500,fontFamily:'inherit',cursor:'pointer'}}>
                  {s==='Won'?'✓ Won':s}
                </button>
              ))}
              <button onClick={()=>del(lead.id)} style={{background:'none',border:'none',color:C.soft,fontSize:11,fontFamily:'inherit',cursor:'pointer',marginLeft:'auto'}}
                onMouseEnter={e=>e.currentTarget.style.color=C.red} onMouseLeave={e=>e.currentTarget.style.color=C.soft}>Delete</button>
            </div>
          </div>
        ))}
      </div>

      {showAdd&&(
        <Modal title="New lead" onClose={()=>setShowAdd(false)}>
          <Inp label="Full name" value={form.name} onChange={v=>setForm({...form,name:v})} placeholder="Client name"/>
          <Inp label="Phone" value={form.phone} onChange={v=>setForm({...form,phone:v})} placeholder="479-555-0000" type="tel"/>
          <Inp label="Email" value={form.email} onChange={v=>setForm({...form,email:v})} placeholder="client@email.com" type="email"/>
          <Inp label="Address" value={form.address} onChange={v=>setForm({...form,address:v})} placeholder="Job site address"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Sel label="Trade" value={form.trade} onChange={v=>setForm({...form,trade:v})} options={trades}/>
            <Sel label="Source" value={form.source} onChange={v=>setForm({...form,source:v})} options={sources}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Sel label="Status" value={form.status} onChange={v=>setForm({...form,status:v})} options={statuses}/>
            <Inp label="Est. value" value={form.value} onChange={v=>setForm({...form,value:v})} placeholder="$0" type="number"/>
          </div>
          <div style={{marginBottom:20}}>
            <label style={{display:'block',fontSize:12,fontWeight:500,color:C.text,marginBottom:5}}>Notes</label>
            <textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Scope, timeline, anything important..."
              style={{width:'100%',minHeight:80,background:C.white,border:`1px solid ${C.border}`,borderRadius:8,padding:'9px 12px',color:C.text,fontSize:14,fontFamily:'inherit',outline:'none',resize:'vertical',lineHeight:1.5}}/>
          </div>
          <Btn onClick={add} loading={loading} style={{width:'100%',padding:'11px'}}>Save lead</Btn>
        </Modal>
      )}
    </div>
  );
}

function Jobs({jobs,setJobs,setInvoices,userId}){
  const [showAdd,setShowAdd]=useState(false);
  const [editJob,setEditJob]=useState(null);
  const [loading,setLoading]=useState(false);
  const [saving,setSaving]=useState(false);
  const blank={client:'',trade:'Roofing',status:'Scheduled',value:'',start_date:today(),address:'',notes:''};
  const [form,setForm]=useState(blank);
  const trades=['Roofing','Plumbing','HVAC','Electrical','Concrete','Framing','Painting','Landscaping','General','Other'];
  const statuses=['Scheduled','In Progress','Complete','On Hold'];

  const add=async()=>{
    if(!form.client.trim())return;
    setLoading(true);
    const{data,error}=await supabase.from('jobs').insert({...form,value:parseFloat(form.value)||0,user_id:userId}).select().single();
    if(!error)setJobs(prev=>[...prev,data]);
    setForm(blank);setShowAdd(false);setLoading(false);
  };

  const saveEdit=async()=>{
    if(!editJob.client.trim())return;
    setSaving(true);
    const{error}=await supabase.from('jobs').update({client:editJob.client,trade:editJob.trade,value:parseFloat(editJob.value)||0,start_date:editJob.start_date,address:editJob.address,notes:editJob.notes,status:editJob.status}).eq('id',editJob.id);
    if(!error){setJobs(prev=>prev.map(j=>j.id===editJob.id?{...j,...editJob,value:parseFloat(editJob.value)||0}:j));}
    setSaving(false);setEditJob(null);
  };

  const updateStatus=async(id,status)=>{
    const job=jobs.find(j=>j.id===id);
    if(!job||job.status===status)return;
    if(status==='Complete'){
      const newInvoice={client:job.client,amount:job.value||0,status:'Draft',user_id:userId};
      const{data:invData,error:invErr}=await supabase.from('invoices').insert(newInvoice).select().single();
      if(invErr){console.error('Invoice creation failed:',invErr.message);return;}
      await supabase.from('jobs').update({status:'Complete'}).eq('id',id);
      setJobs(prev=>prev.filter(j=>j.id!==id));
      setInvoices(prev=>[invData,...prev]);

      setJobs(prev=>prev.map(j=>j.id===id?{...j,status}:j));

  const activeJobs=jobs.filter(j=>j.status!=='Complete');

            <div style={{display:'flex',alignItems:'flex-start',gap:12,marginBottom:8}}>
              <Avatar name={job.client}/>
              <div style={{flex:1}}>
                <div style={{display:'flex',justifyContent:'space-between',gap:8}}>
                  <div>
                    <p style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:2}}>{job.client}</p>
                    <p style={{fontSize:12,color:C.muted}}>{job.trade} · {job.start_date}</p>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <p style={{fontSize:16,fontWeight:700,color:C.green,marginBottom:4}}>{fmt$(job.value)}</p>
                    <Badge s={job.status}/>
                  </div>
                </div>
              </div>
            </div>
            {job.address&&<p style={{fontSize:12,color:C.muted,marginBottom:6,paddingLeft:48}}>📍 {job.address}</p>}
            {job.notes&&<p style={{fontSize:12,color:C.muted,paddingLeft:48,marginBottom:8,lineHeight:1.5}}>{job.notes}</p>}
            <div style={{display:'flex',gap:6,paddingLeft:48,alignItems:'center'}}>
              {statuses.filter(s=>s!==job.status).map(s=>(
                <button key={s} onClick={()=>updateStatus(job.id,s)}
                  style={{background:s==='Complete'?C.greenBg:C.bg,border:`1px solid ${s==='Complete'?C.green:C.border}`,borderRadius:6,padding:'4px 10px',color:s==='Complete'?C.green:C.muted,fontSize:11,fontWeight:s==='Complete'?600:500,fontFamily:'inherit',cursor:'pointer'}}>
                  {s==='Complete'?'✓ Complete':s}
                </button>
              ))}
              <button onClick={()=>setEditJob({...job,value:job.value||''})} style={{background:'none',border:`1px solid ${C.border}`,borderRadius:6,padding:'4px 10px',color:C.muted,fontSize:11,fontWeight:500,fontFamily:'inherit',cursor:'pointer',marginLeft:'auto'}}>Edit</button>
              <button onClick={()=>delJob(job.id)} style={{background:'none',border:'none',color:C.soft,fontSize:11,fontFamily:'inherit',cursor:'pointer'}}

          <Inp label="Address" value={form.address} onChange={v=>setForm({...form,address:v})} placeholder="Job site address"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Sel label="Trade" value={form.trade} onChange={v=>setForm({...form,trade:v})} options={trades}/>
            <Sel label="Status" value={form.status} onChange={v=>setForm({...form,status:v})} options={statuses}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>

            <Inp label="Start date" value={form.start_date} onChange={v=>setForm({...form,start_date:v})} type="date"/>
          </div>
          <div style={{marginBottom:20}}>
            <label style={{display:'block',fontSize:12,fontWeight:500,color:C.text,marginBottom:5}}>Notes</label>
            <textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Scope, crew, materials..."
              style={{width:'100%',minHeight:70,background:C.white,border:`1px solid ${C.border}`,borderRadius:8,padding:'9px 12px',color:C.text,fontSize:14,fontFamily:'inherit',outline:'none',resize:'vertical',lineHeight:1.5}}/>
          </div>
          <Btn onClick={add} loading={loading} style={{width:'100%',padding:'11px'}}>Save job</Btn>
        </Modal>
      )}

      {editJob&&(
        <Modal title="Edit job" onClose={()=>setEditJob(null)}>
          <Inp label="Client name" value={editJob.client} onChange={v=>setEditJob({...editJob,client:v})} placeholder="Client name"/>
          <Inp label="Address" value={editJob.address||''} onChange={v=>setEditJob({...editJob,address:v})} placeholder="Job site address"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Sel label="Trade" value={editJob.trade} onChange={v=>setEditJob({...editJob,trade:v})} options={trades}/>
            <Sel label="Status" value={editJob.status} onChange={v=>setEditJob({...editJob,status:v})} options={statuses}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Inp label="Value" value={String(editJob.value)} onChange={v=>setEditJob({...editJob,value:v})} placeholder="$0" type="number"/>
            <Inp label="Start date" value={editJob.start_date||''} onChange={v=>setEditJob({...editJob,start_date:v})} type="date"/>
          </div>
          <div style={{marginBottom:20}}>
            <label style={{display:'block',fontSize:12,fontWeight:500,color:C.text,marginBottom:5}}>Notes</label>
            <textarea value={editJob.notes||''} onChange={e=>setEditJob({...editJob,notes:e.target.value})} placeholder="Scope, crew, materials..."
              style={{width:'100%',minHeight:70,background:C.white,border:`1px solid ${C.border}`,borderRadius:8,padding:'9px 12px',color:C.text,fontSize:14,fontFamily:'inherit',outline:'none',resize:'vertical',lineHeight:1.5}}/>

          <Btn onClick={saveEdit} loading={saving} style={{width:'100%',padding:'11px'}}>Save changes</Btn>
        </Modal>
      )}
    </div>
  );
}


function InvoiceCreator({userId,profile,onClose,onSave}){
  const blankLine={desc:'',qty:'1',price:''};
  const [saving,setSaving]=useState(false);
  const [form,setForm]=useState({
    client_name:'',client_email:'',client_phone:'',client_address:'',
    title:'For Services Rendered',
    issued_date:today(),due_date:'',
    tax_pct:'0',notes:'',
    lines:[{desc:'',qty:'1',price:''}],
  });

  const updateLine=(i,k,v)=>setForm(f=>({...f,lines:f.lines.map((l,idx)=>idx===i?{...l,[k]:v}:l)}));
  const addLine=()=>setForm(f=>({...f,lines:[...f.lines,{desc:'',qty:'1',price:''}]}));
  const removeLine=(i)=>setForm(f=>({...f,lines:f.lines.filter((_,idx)=>idx!==i)}));

  const subtotal=form.lines.reduce((a,l)=>a+(parseFloat(l.qty)||0)*(parseFloat(l.price)||0),0);
  const taxAmt=subtotal*(parseFloat(form.tax_pct)||0)/100;
  const total=subtotal+taxAmt;
  const f2=n=>'$'+n.toFixed(2);
  const invNum='INV-'+Date.now().toString().slice(-6);
  const biz=profile?.business_name||profile?.full_name||'Your Business';

  const printInvoice=()=>{
    const rows=form.lines.filter(l=>l.desc||l.price).map(l=>{
      const amt=(parseFloat(l.qty)||0)*(parseFloat(l.price)||0);
      return '<tr><td>'+l.desc+'</td><td style="text-align:right">'+l.qty+'</td><td style="text-align:right">'+f2(parseFloat(l.price)||0)+'</td><td style="text-align:right">'+f2(amt)+'</td></tr>';
    }).join('');
    const taxRow=parseFloat(form.tax_pct)>0?'<tr><td colspan="3" style="text-align:right;color:#666">Tax ('+form.tax_pct+'%)</td><td style="text-align:right">'+f2(taxAmt)+'</td></tr>':'';
    const notesHtml=form.notes?'<div style="margin-top:32px;padding:16px;background:#F9FAFB;border-radius:8px;font-size:13px;color:#555"><strong>Notes:</strong><br>'+form.notes+'</div>':'';
    const html='<!DOCTYPE html><html><head><title>'+invNum+'</title>'
      +'<style>body{font-family:Helvetica Neue,sans-serif;color:#111;padding:48px;max-width:760px;margin:0 auto}'
      +'.top{display:flex;justify-content:space-between;margin-bottom:40px}'
      +'.biz{font-size:22px;font-weight:700}'
      +'.inv{font-size:28px;font-weight:800;color:#1B4FD8;text-align:right}'
      +'.num{font-size:13px;color:#666;text-align:right}'
      +'.meta{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-bottom:36px}'
      +'label{font-size:10px;font-weight:700;letter-spacing:.08em;color:#999;text-transform:uppercase;display:block;margin-bottom:4px}'
      +'table{width:100%;border-collapse:collapse;margin-bottom:24px}'
      +'th{background:#F3F4F6;font-size:11px;font-weight:700;text-transform:uppercase;color:#666;padding:10px 14px;text-align:left}'
      +'td{padding:10px 14px;border-bottom:1px solid #E5E7EB;font-size:14px}'
      +'.tot{display:flex;justify-content:space-between;padding:6px 0;font-size:14px}'
      +'.tot.final{font-weight:700;font-size:16px;border-top:2px solid #111;padding-top:10px;margin-top:4px}'
      +'.footer{margin-top:40px;padding-top:16px;border-top:1px solid #E5E7EB;font-size:12px;color:#999;text-align:center}'
      +'@media print{body{padding:20px}}</style></head><body>'
      +'<div class="top"><div class="biz">'+biz+'</div><div><div class="inv">INVOICE</div><div class="num">'+invNum+'</div></div></div>'
      +'<div class="meta"><div><label>Billed To</label><p><strong>'+form.client_name+'</strong>'+(form.client_email?'<br>'+form.client_email:'')+(form.client_phone?'<br>'+form.client_phone:'')+(form.client_address?'<br>'+form.client_address:'')+'</p></div>'
      +'<div><label>Invoice Details</label><p>Issued: '+(form.issued_date||'—')+'<br>Due: '+(form.due_date||'Upon receipt')+'</p></div></div>'
      +(form.title?'<p style="font-size:15px;font-weight:600;margin-bottom:16px">'+form.title+'</p>':'')
      +'<table><thead><tr><th>Description</th><th style="text-align:right">Qty</th><th style="text-align:right">Price</th><th style="text-align:right">Amount</th></tr></thead>'
      +'<tbody>'+rows+'</tbody>'
      +'<tfoot><tr><td colspan="3" style="text-align:right;color:#666">Subtotal</td><td style="text-align:right">'+f2(subtotal)+'</td></tr>'
      +taxRow
      +'<tr><td colspan="3" style="text-align:right;font-weight:700;font-size:15px">Total</td><td style="text-align:right;font-weight:700;font-size:15px;color:#1B4FD8">'+f2(total)+'</td></tr>'
      +'</tfoot></table>'
      +notesHtml
      +'<div class="footer">Generated by Hubstak &middot; Thank you for your business!</div>'
      +'</body></html>';
    const win=window.open('','_blank');
    win.document.write(html);
    win.document.close();
    setTimeout(()=>win.print(),400);
  };

  const save=async()=>{
    if(!form.client_name.trim())return;
    setSaving(true);
    const{data,error}=await supabase.from('invoices').insert({
      client:form.client_name,amount:total,status:'Draft',
      due_date:form.due_date||null,user_id:userId,
    }).select().single();
    setSaving(false);
    if(!error&&data)onSave(data);
  };

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.35)',zIndex:100,
      display:'flex',alignItems:'flex-start',justifyContent:'center',
      paddingTop:60,overflowY:'auto'}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:C.white,borderRadius:16,width:'calc(100% - 32px)',maxWidth:500,

function Invoices({invoices,setInvoices,userId,profile}){
  const [showAdd,setShowAdd]=useState(false);
  const statuses=['Draft','Sent','Paid','Overdue'];

  const paid=invoices.filter(i=>i.status==='Paid').reduce((a,i)=>a+(i.amount||0),0);
  const owed=invoices.filter(i=>i.status==='Sent'||i.status==='Overdue').reduce((a,i)=>a+(i.amount||0),0);

  const updateStatus=async(id,status)=>{
    await supabase.from('invoices').update({status}).eq('id',id);
    setInvoices(prev=>prev.map(i=>i.id===id?{...i,status}:i));
  };

  const delInvoice=async(id)=>{
    await supabase.from('invoices').delete().eq('id',id);
    setInvoices(prev=>prev.filter(i=>i.id!==id));
  };

  const clearAllPaid=async()=>{
    if(!confirm('Clear all paid invoices?'))return;
    const paidIds=invoices.filter(i=>i.status==='Paid').map(i=>i.id);
    await supabase.from('invoices').delete().in('id',paidIds);
    setInvoices(prev=>prev.filter(i=>i.status!=='Paid'));
  };

  return(
    <div>
      <div className="fu" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
        <div>
          <h1 style={{fontSize:24,fontWeight:800,color:C.text,letterSpacing:'-0.03em'}}>Invoices</h1>
          <p style={{fontSize:13,color:C.muted,marginTop:2}}>{fmt$(owed)} owed · {fmt$(paid)} collected</p>
        </div>
        <Btn onClick={()=>setShowAdd(true)}>+ Create</Btn>
      </div>

      <div className="fu1" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}}>
        {[{label:'Outstanding',val:fmt$(owed),color:C.amber},{label:'Collected',val:fmt$(paid),color:C.green}].map(s=>(
          <div key={s.label} style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:12,padding:'14px 16px'}}>
            <p style={{fontSize:11,fontWeight:500,color:C.muted,letterSpacing:'0.02em',marginBottom:6}}>{s.label.toUpperCase()}</p>
            <p style={{fontSize:20,fontWeight:600,color:s.color,letterSpacing:'-0.02em'}}>{s.val}</p>
          </div>
        ))}
      </div>

      {(()=>{
        const active=invoices.filter(i=>i.status!=='Paid');
        const paidList=invoices.filter(i=>i.status==='Paid');
        const [showPaid,setShowPaid]=useState(false);
        return(<>
          {paidList.length>0&&(
            <div style={{marginBottom:16}}>
              <button onClick={()=>setShowPaid(p=>!p)}
                style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',background:C.greenBg,border:`1px solid #A7F3D0`,borderRadius:showPaid?'12px 12px 0 0':12,padding:'14px 16px',cursor:'pointer',fontFamily:'inherit'}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:16}}>✅</span>
                  <span style={{fontSize:14,fontWeight:600,color:C.green}}>Paid Invoices</span>
                  <span style={{background:C.green,color:'#fff',fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:20}}>{paidList.length}</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:14,fontWeight:600,color:C.green}}>{fmt$(paidList.reduce((a,i)=>a+(i.amount||0),0))}</span>
                  {showPaid&&<button onClick={e=>{e.stopPropagation();clearAllPaid();}} style={{background:'none',border:`1px solid #A7F3D0`,borderRadius:6,padding:'3px 8px',fontSize:11,color:C.green,fontFamily:'inherit',cursor:'pointer'}}>Clear all</button>}
                  <span style={{color:C.green,fontSize:12}}>{showPaid?'▲':'▼'}</span>
                </div>
              </button>
              {showPaid&&(
                <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:'0 0 12px 12px',overflow:'hidden',marginBottom:4}}>
                  {paidList.map((inv,i,arr)=>(
                    <div key={inv.id} style={{padding:'14px 16px',borderBottom:i<arr.length-1?`1px solid ${C.border2}`:'none'}}>
                      <div style={{display:'flex',alignItems:'center',gap:12}}>
                        <Avatar name={inv.client}/>
                        <div style={{flex:1}}>
                          <div style={{display:'flex',justifyContent:'space-between',gap:8}}>
                            <div>
                              <p style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:2}}>{inv.client}</p>
                              <p style={{fontSize:12,color:C.muted}}>{inv.due_date?`Paid ${inv.due_date}`:'Paid'}</p>
                            </div>
                            <div style={{textAlign:'right',flexShrink:0,display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
                              <p style={{fontSize:16,fontWeight:600,color:C.green}}>{fmt$(inv.amount)}</p>
                              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                                <button onClick={()=>{
                                  const token=inv.review_token;
                                  if(token){
                                    const url=`${window.location.origin}/review/${token}`;
                                    navigator.clipboard.writeText(url);
                                    alert('Review link copied!');
                                  } else {
                                    const newToken=Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2);
                                    supabase.from('invoices').update({review_token:newToken}).eq('id',inv.id).then(()=>{
                                      const url=`${window.location.origin}/review/${newToken}`;
                                      navigator.clipboard.writeText(url);
                                      alert('Review link copied!');
                                    });
                                  }
                                }} style={{background:'none',border:`1px solid ${C.blue}`,borderRadius:6,padding:'3px 8px',fontSize:11,color:C.blue,fontFamily:'inherit',cursor:'pointer'}}>⭐ Request</button>
                                <button onClick={()=>delInvoice(inv.id)} style={{background:'none',border:'none',color:C.soft,fontSize:11,fontFamily:'inherit',cursor:'pointer',padding:0}}
                                  onMouseEnter={e=>e.currentTarget.style.color=C.red} onMouseLeave={e=>e.currentTarget.style.color=C.soft}>Delete</button>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
          <div className="fu2" style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:12,overflow:'hidden',marginBottom:20,boxShadow:'0 2px 6px rgba(0,0,0,0.07),0 8px 20px rgba(0,0,0,0.10)'}}>
            {active.length===0&&<div style={{padding:32,textAlign:'center',color:C.muted,fontSize:14}}>No open invoices.</div>}
            {active.map((inv,i,arr)=>(
              <div key={inv.id} style={{padding:'14px 16px',borderBottom:i<arr.length-1?`1px solid ${C.border2}`:'none'}}>
                <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
                  <Avatar name={inv.client}/>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',justifyContent:'space-between',gap:8}}>
                      <div>
                        <p style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:2}}>{inv.client}</p>
                        <p style={{fontSize:12,color:C.muted}}>{inv.due_date?`Due ${inv.due_date}`:'No due date'}</p>
                      </div>
                      <div style={{textAlign:'right',flexShrink:0}}>
                        <p style={{fontSize:16,fontWeight:600,color:C.text,marginBottom:4}}>{fmt$(inv.amount)}</p>
                        <Badge s={inv.status}/>
                      </div>
                    </div>
                  </div>
                </div>
                <div style={{display:'flex',gap:6,paddingLeft:48}}>
                  {statuses.filter(s=>s!==inv.status).map(s=>(
                    <button key={s} onClick={()=>updateStatus(inv.id,s)}
                      style={{background:s==='Paid'?C.greenBg:C.bg,border:`1px solid ${s==='Paid'?C.green:C.border}`,borderRadius:6,padding:'4px 10px',color:s==='Paid'?C.green:C.muted,fontSize:11,fontWeight:s==='Paid'?600:500,fontFamily:'inherit',cursor:'pointer'}}>
                      {s==='Paid'?'✓ Paid':s}
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </>);
      })()}

      {showAdd&&<InvoiceCreator userId={userId} profile={profile} onClose={()=>setShowAdd(false)} onSave={inv=>{setInvoices(prev=>[inv,...prev]);setShowAdd(false);}}/>
    </div>
  );
}

function LeadCaptureForm({slug}){
  const [profile,setProfile]=useState(null);
  const [loading,setLoading]=useState(true);
  const [submitted,setSubmitted]=useState(false);
  const [saving,setSaving]=useState(false);
  const [reviews,setReviews]=useState([]);
  const [form,setForm]=useState({name:'',phone:'',email:'',address:'',trade:'Roofing',notes:''});
  const trades=['Roofing','Plumbing','HVAC','Electrical','Concrete','Framing','Painting','Landscaping','General','Other'];

  useEffect(()=>{
    supabase.from('profiles').select('*').eq('slug',slug).single()
      .then(async({data})=>{
        setProfile(data);
        if(data?.id){
          const{data:revs}=await supabase.from('reviews').select('rating,reviewer_name,comment,created_at').eq('user_id',data.id).order('created_at',{ascending:false});
          setReviews(revs||[]);
        }
        setLoading(false);
      });
  },[slug]);

  const submit=async()=>{
    if(!form.name.trim()||!form.phone.trim())return;
    setSaving(true);
    await supabase.from('leads').insert({...form,user_id:profile.id,source:'Web Form',status:'New'});
    setSaving(false);setSubmitted(true);
  };

  if(loading)return(<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:C.white}}><Spinner/></div>);
  if(!profile)return(<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:C.white,padding:24,textAlign:'center'}}><div><p style={{fontSize:16,fontWeight:500,color:C.text,marginBottom:8}}>Page not found</p><p style={{fontSize:14,color:C.muted}}>This link may be invalid.</p></div></div>);
  if(submitted)return(<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:C.white,padding:24,textAlign:'center'}}><div><div style={{width:56,height:56,background:C.greenBg,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',fontSize:24}}>✓</div><p style={{fontSize:18,fontWeight:600,color:C.text,marginBottom:8}}>Request sent!</p><p style={{fontSize:14,color:C.muted}}>{profile.business_name||profile.full_name} will be in touch shortly.</p></div></div>);

  return(
    <div style={{maxWidth:480,margin:'0 auto',minHeight:'100vh',background:C.white,padding:'32px 20px 40px'}}>
      <div style={{textAlign:'center',marginBottom:28}}>
        <h1 style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:6}}>{profile.business_name||profile.full_name}</h1>
        {reviews.length>0&&(()=>{
          const avg=(reviews.reduce((a,r)=>a+r.rating,0)/reviews.length).toFixed(1);
          return(
            <div style={{display:'inline-flex',alignItems:'center',gap:6,
              background:'#FFFBEB',border:'1px solid #FCD34D',borderRadius:20,
              padding:'5px 14px',marginBottom:10}}>
              <span style={{fontSize:16}}>⭐</span>
              <span style={{fontSize:14,fontWeight:700,color:'#92400E'}}>{avg}</span>
              <span style={{fontSize:13,color:'#B45309'}}>· {reviews.length} review{reviews.length>1?'s':''}</span>
            </div>
          );
        })()}
        <p style={{fontSize:14,color:C.muted}}>Request a free quote — we'll get back to you fast.</p>
      </div>
      <Inp label="Your name *" value={form.name} onChange={v=>setForm({...form,name:v})} placeholder="Full name"/>
      <Inp label="Phone number *" value={form.phone} onChange={v=>setForm({...form,phone:v})} placeholder="479-555-0000" type="tel"/>
      <Inp label="Email" value={form.email} onChange={v=>setForm({...form,email:v})} placeholder="your@email.com" type="email"/>
      <Inp label="Address" value={form.address} onChange={v=>setForm({...form,address:v})} placeholder="Service address"/>
      <Sel label="Service needed" value={form.trade} onChange={v=>setForm({...form,trade:v})} options={trades}/>
      <div style={{marginBottom:20}}>
        <label style={{display:'block',fontSize:12,fontWeight:500,color:C.text,marginBottom:5}}>Tell us about the job</label>
        <textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Describe what you need done..."
          style={{width:'100%',minHeight:100,background:C.white,border:`1px solid ${C.border}`,borderRadius:8,padding:'9px 12px',color:C.text,fontSize:14,fontFamily:'inherit',outline:'none',resize:'vertical',lineHeight:1.5}}/>
      </div>
      <Btn onClick={submit} loading={saving} style={{width:'100%',padding:'13px',fontSize:15}}>Request Free Quote</Btn>
      <p style={{fontSize:11,color:C.soft,textAlign:'center',marginTop:12}}>Powered by Hubstak</p>

      {reviews.length>0&&(
        <div style={{marginTop:32,borderTop:`1px solid ${C.border}`,paddingTop:24}}>
          <h3 style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:16,textAlign:'center',letterSpacing:'0.02em'}}>
            WHAT CUSTOMERS SAY
          </h3>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>

              <div key={i} style={{background:C.bg,borderRadius:12,padding:'14px 16px',border:`1px solid ${C.border}`}}>

              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function ReviewForm({token}){

  const [comment,setComment]=useState('');

    supabase.from('invoices').select('user_id').eq('review_token',token).maybeSingle()
      .then(async({data})=>{
        if(data?.user_id){
          const{data:prof}=await supabase.from('profiles').select('business_name,full_name').eq('id',data.user_id).maybeSingle();
          setProfile(prof||{business_name:'This Contractor'});
        } else {
          setProfile(null);

        setLoading(false);
      });

      user_id:inv.user_id,review_token:token,
      reviewer_name:name,rating,comment
    });
    setSaving(false);setSubmitted(true);
  };

  if(loading)return(<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:C.white}}><Spinner/></div>);

  if(!profile)return(<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:C.white,padding:24,textAlign:'center'}}>

  </div>);

  if(submitted)return(<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:C.white,padding:24,textAlign:'center'}}>
    <div>
      <div style={{fontSize:48,marginBottom:16}}>⭐</div>
      <p style={{fontSize:20,fontWeight:700,color:C.text,marginBottom:8}}>Thanks for your review!</p>
      <p style={{fontSize:14,color:C.muted}}>{profile.business_name||profile.full_name} appreciates your feedback.</p>
    </div>
  </div>);

  return(
    <div style={{maxWidth:480,margin:'0 auto',minHeight:'100vh',background:C.white,padding:'40px 24px'}}>
      <div style={{textAlign:'center',marginBottom:32}}>
        <p style={{fontSize:13,color:C.muted,marginBottom:4,fontWeight:500}}>Leave a review for</p>

        <p style={{fontSize:14,color:C.muted,marginBottom:12,fontWeight:500}}>How was your experience?</p>

                filter:(hover||rating)>=s?'none':'grayscale(1) opacity(0.3)'}}>
              ⭐

        </div>
        {rating>0&&<p style={{fontSize:13,color:C.blue,fontWeight:600,marginTop:8}}>
          {['','Poor','Fair','Good','Great','Excellent!'][rating]}
        </p>}
      </div>

      <div style={{marginBottom:16}}>
        <label style={{display:'block',fontSize:12,fontWeight:600,color:C.text,marginBottom:6}}>Your name *</label>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="First name is fine"
          style={{width:'100%',background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,
            padding:'11px 14px',color:C.text,fontSize:14,fontFamily:'inherit',outline:'none'}}
          onFocus={e=>e.target.style.borderColor=C.blue}
          onBlur={e=>e.target.style.borderColor=C.border}/>
      </div>

      <div style={{marginBottom:24}}>
        <label style={{display:'block',fontSize:12,fontWeight:600,color:C.text,marginBottom:6}}>Tell others about your experience <span style={{color:C.muted,fontWeight:400}}>(optional)</span></label>
        <textarea value={comment} onChange={e=>setComment(e.target.value)}
          placeholder="What did they do well? Would you recommend them?"
          style={{width:'100%',minHeight:100,background:C.bg,border:`1px solid ${C.border}`,
            borderRadius:10,padding:'11px 14px',color:C.text,fontSize:14,
            fontFamily:'inherit',outline:'none',resize:'vertical',lineHeight:1.6}}/>
      </div>

      <button onClick={submit} disabled={saving||!rating||!name.trim()}
        style={{width:'100%',padding:'13px',background:rating&&name.trim()?C.accent:'#CBD5E1',
          color:'white',border:'none',borderRadius:12,fontSize:15,fontWeight:700,
          fontFamily:'inherit',cursor:rating&&name.trim()?'pointer':'not-allowed',
          boxShadow:rating&&name.trim()?'0 2px 8px rgba(27,79,216,0.3)':'none'}}>
        {saving?'Submitting...':'Submit Review'}
      </button>

      <p style={{fontSize:11,color:C.soft,textAlign:'center',marginTop:16}}>Powered by Hubstak</p>
    </div>
  );
}

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAf//Z";

function App(){
  const [session,setSession]=useState(null);
  const [profile,setProfile]=useState(null);
  const [leads,setLeads]=useState([]);
  const [jobs,setJobs]=useState([]);
  const [invoices,setInvoices]=useState([]);
  const [screen,setScreen]=useState('dashboard');
  const [loading,setLoading]=useState(true);

  const path=window.location.pathname;
  const quoteMatch=path.match(/^\/quote\/(.+)/);
  const reviewMatch=path.match(/^\/review\/(.+)/);

  useEffect(()=>{
    if(quoteMatch)return;
    supabase.auth.getSession().then(({data:{session}})=>{
      setSession(session);
      if(session)loadData(session.user.id);
      else setLoading(false);
    });
    const{data:{subscription}}=supabase.auth.onAuthStateChange((event,session)=>{
      if(event==='INITIAL_SESSION')return;
      setSession(session);
      if(session)loadData(session.user.id);
      else{setLoading(false);setLeads([]);setJobs([]);setInvoices([]);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  const loadData=async(uid)=>{
    setLoading(true);
    const[p,l,j,i]=await Promise.all([
      supabase.from('profiles').select('*').eq('id',uid).maybeSingle(),
      supabase.from('leads').select('*').eq('user_id',uid).order('created_at',{ascending:false}),
      supabase.from('jobs').select('*').eq('user_id',uid).order('created_at',{ascending:false}),
      supabase.from('invoices').select('*').eq('user_id',uid).order('created_at',{ascending:false}),
    ]);
    setProfile(p?.data);
    setLeads(l?.data||[]);
    setJobs(j?.data||[]);
    setInvoices(i?.data||[]);
    setLoading(false);
  };

  const signOut=async()=>{await supabase.auth.signOut();setScreen('dashboard');};

  if(quoteMatch)return <LeadCaptureForm slug={quoteMatch[1]}/>;
  if(reviewMatch)return <ReviewForm token={reviewMatch[1]}/>;
  if(loading)return(<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:C.white}}><div style={{textAlign:'center'}}><Spinner/><p style={{fontSize:13,color:C.muted,marginTop:12}}>Loading...</p></div></div>);
  if(!session)return <AuthScreen onAuth={()=>{}}/>;

  const NAV=[
    {id:'dashboard',label:'Home',icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="11" y="2" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="2" y="11" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="11" y="11" width="7" height="7" rx="1.5" fill="currentColor"/></svg>},
    {id:'leads',label:'Leads',icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="7" r="3.5" stroke="currentColor" strokeWidth="1.5"/><path d="M3 17c0-3.314 3.134-6 7-6s7 2.686 7 6" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>},
    {id:'jobs',label:'Jobs',icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="7" width="14" height="10" rx="1.5" stroke="currentColor" strokeWidth="1.5"/><path d="M7 7V5a3 3 0 016 0v2" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>},
    {id:'invoices',label:'Money',icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="2" y="5" width="16" height="10" rx="1.5" stroke="currentColor" strokeWidth="1.5"/><circle cx="10" cy="10" r="2" stroke="currentColor" strokeWidth="1.5"/></svg>},
  ];

  return(
    <div style={{maxWidth:430,margin:'0 auto',minHeight:'100vh',minHeight:'100dvh',background:C.bg,color:C.text,fontFamily:"'DM Sans',system-ui,sans-serif",display:'flex',flexDirection:'column'}}>
      <div style={{background:C.white,padding:'52px 20px 14px',borderBottom:`1px solid ${C.border}`,position:'sticky',top:0,zIndex:10,boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:48,height:48,borderRadius:8,overflow:'hidden'}}>
              <img src={logoSrc} style={{width:48,height:48,objectFit:'cover'}} alt="Hubstak"/>
            </div>
            <div>
              <p style={{fontSize:9,fontWeight:500,color:C.muted,letterSpacing:'0.06em',textTransform:'uppercase',lineHeight:1,marginBottom:1}}>Hubstak</p>
              <p style={{fontSize:17,fontWeight:600,color:C.text,letterSpacing:'-0.02em',lineHeight:1}}>{NAV.find(n=>n.id===screen)?.label}</p>
            </div>
          </div>
          <button onClick={signOut} style={{background:'none',border:`1px solid ${C.border}`,borderRadius:6,padding:'4px 10px',fontSize:11,color:C.muted,fontFamily:'inherit',cursor:'pointer'}}>Sign out</button>
        </div>
      </div>

      <div style={{flex:1,overflowY:'auto',padding:'20px 16px 160px',WebkitOverflowScrolling:'touch'}}>
        {screen==='dashboard'&&<Dashboard leads={leads} jobs={jobs} invoices={invoices} profile={profile} onNavigate={setScreen}/>}
        {screen==='leads'&&<Leads leads={leads} setLeads={setLeads} setJobs={setJobs} userId={session.user.id}/>}
        {screen==='jobs'&&<Jobs jobs={jobs} setJobs={setJobs} setInvoices={setInvoices} userId={session.user.id}/>}
        {screen==='invoices'&&<Invoices invoices={invoices} setInvoices={setInvoices} userId={session.user.id} profile={profile}/>}
      </div>

      <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:430,background:C.white,borderTop:`1px solid ${C.border}`,display:'flex',padding:'10px 0 28px',zIndex:10}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setScreen(n.id)}
            style={{flex:1,background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:4,fontFamily:'inherit',padding:'2px 0',color:screen===n.id?C.accent:C.soft,transition:'color 0.15s'}}>
            {n.icon}
            <span style={{fontSize:10,fontWeight:screen===n.id?600:400,letterSpacing:'0.02em'}}>{n.label}</span>
            {screen===n.id&&<div style={{width:16,height:2,background:C.accent,borderRadius:2}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
